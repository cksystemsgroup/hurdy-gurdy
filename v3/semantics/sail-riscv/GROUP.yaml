# The sail-riscv source-semantics group — a correctness commons.
# Every hop whose source is rv64 shares this oracle and its lemmas. The group
# key is (language, artifact, version): a Sail bump is a re-verification event
# for every member and every realization.
language: rv64
artifact: sail-riscv
version: "0.18.0"                 # PINNED. bump => regenerate + re-verify realizations
model_dir: model/                # vendored, pinned Sail-RISCV source

# Two realizations of the same semantics. Fidelity of the machine realization
# = it agrees with the reference (the whole-machine equivalence proof).
realizations:
  emulator:
    role: reference              # the differential ground truth (sandboxed behind the gate)
    entry: realizations/emulator/oracle.py
  btor2-machine:
    role: model                  # the model-checkable form, produced by tools/sail_btor2_machine
    artifact: realizations/btor2-machine/model.btor2
    fidelity_report: realizations/btor2-machine/MachineFidelityReport.json
    # PARTIAL: the RV64I/M ALU slice (43 instrs: reg-reg, reg-imm, W-ops, LUI,
    # AUIPC, M mul/div) has per-instruction QF_BV execute lemmas DISCHARGED by
    # z3. NOT GREEN because (a) the fetch/decode/pc/control harness lemma is the
    # next slice (execute-datapath only), and (b) the reference is a spec-derived
    # reference_rv64.py standing in for Sail until the Sail emulator is wired.
    # Control flow / loads / stores / CSRs / traps / FP are explicitly out of slice.
    equivalence: PARTIAL         # set to GREEN by the machine gate when complete

idf_allowlist: idf_allowlist.yaml
