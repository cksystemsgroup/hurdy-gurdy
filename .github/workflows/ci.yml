name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: CLI smoke
        run: |
          gurdy routes c smt-lib
          gurdy plan
          gurdy chain
      - name: Gate the registry (F0 typed real; heavier levels SKIP without the bench image)
        run: |
          for m in registry/*.yaml; do
            id=$(basename "$m" .yaml)
            gurdy gate "$id"
          done
