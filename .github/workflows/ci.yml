name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: CLI smoke
        run: |
          gurdy routes c smt-lib
          gurdy plan
          gurdy chain
      - name: Gate machinery runs to completion for every registered hop
        run: |
          # On a bare runner (no Sail/pono/gcc) F1–F3 SKIP and stub hops BLOCK —
          # both expected. Real merge-gating runs in the bench image (pair-gate).
          # Here we only assert the gate executes end-to-end for every hop, i.e.
          # it reaches a merge decision rather than crashing.
          fail=0
          for m in registry/*.yaml; do
            id=$(basename "$m" .yaml)
            echo "::group::gurdy gate $id"
            out=$(gurdy gate "$id" 2>&1) || true
            printf '%s\n' "$out"
            echo "::endgroup::"
            if ! printf '%s\n' "$out" | grep -q '^merge:'; then
              echo "::error::gate did not reach a decision for $id (machinery crash)"
              fail=1
            fi
          done
          exit $fail
