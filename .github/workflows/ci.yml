name: CI

# Fast per-change checks: the framework + interpreter unit suite (with the z3
# backend installed so the solver/commuting-square tests actually run), a
# repo-wide markdown link check, and the capped route-grader slice wired to
# the ledger (tools/route_grader.py; ROUTES.md §7). The heavier, pinned
# benchmark runs (BENCHMARKS.md) use the dev image (DOCKER.md) and are a
# later addition.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install gurdy with the z3 solver backend
        run: python -m pip install -e ".[solvers]"
      - name: Unit tests (framework + interpreters)
        run: python -m unittest discover -s tests -v

  # Phase 1 of the automated-scaling rollout (SCALING.md §12.1): the fast
  # per-change gate. Emits the machine-readable PR manifest (.hg/pr.yaml) the
  # coordinator reads, and fails on a pair that cannot be measured or a touched
  # pair whose translator is non-deterministic. Solver-free (interpreters only);
  # the heavier route-grader / branch-agreement runs are a later phase.
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # need history for the change diff (merge-base)
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install gurdy
        run: python -m pip install -e ".[solvers]"
      - name: Make the base ref available for the change diff
        run: git fetch --no-tags origin main:refs/remotes/origin/main || true
      - name: Emit the PR manifest and run the fast gate
        run: python tools/pr_manifest.py --base origin/main --out .hg/pr.yaml
      - name: Upload the PR manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-manifest
          path: .hg/pr.yaml

      # Shadow-mode autonomy (SCALING.md §12.8): on each merge to main, record
      # what the autonomy ladder *would* have done for this change beside the fact
      # that it merged. The coordinator collects these entries and `accumulate`s
      # them into the evidence ledger — so the bar for graduating out of propose
      # mode is cleared by real trunk history, never a guess. Auxiliary and
      # non-gating: a hiccup here must never red a merge (continue-on-error).
      - name: Emit the shadow-mode autonomy entry (merges to main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: >
          python tools/shadow_ledger.py entry
          --base HEAD~1 --ref "${{ github.sha }}"
          --human-action merged --out .hg/shadow-entry.json
      - name: Upload the shadow entry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: shadow-entry-${{ github.sha }}
          path: .hg/shadow-entry.json

  # The capped route-grader slice, wired to the ledger (ROUTES.md §7;
  # gurdy/core/ledger.py): composed coverage over every probe-carrying source
  # that reaches a hub, plus a small bridged-decide corpus, with
  # GURDY_LEDGER set so the instrumented call sites record. The ledger
  # accumulates across runs via the cache (an always-miss key with a
  # restore-keys prefix restores the latest and saves the appended file);
  # records are host-tagged, so profiles pool per runner class and never mix
  # with a developer's machine. Measures and reports — coverage gating is the
  # merge queue's business, so a failure here never reds a merge.
  route-grader:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install gurdy with the z3 solver backend
        run: python -m pip install -e ".[solvers]"
      - name: Restore the accumulated ledger
        uses: actions/cache@v4
        with:
          path: .hg/ledger.jsonl
          key: ledger-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            ledger-${{ runner.os }}-
      - name: Run the capped route-grader against the ledger
        env:
          GURDY_LEDGER: .hg/ledger.jsonl
        run: python tools/route_grader.py
      - name: Annotated route report over the accumulated ledger
        env:
          GURDY_LEDGER: .hg/ledger.jsonl
        run: |
          python -m gurdy routes riscv smtlib --report
          python -m gurdy routes aarch64 smtlib --report
      - name: Upload the ledger
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ledger-${{ github.run_id }}
          path: .hg/ledger.jsonl

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check relative markdown links
        run: python scripts/check_links.py
