[task]
id = "0005-if-no-trap"
pair = "wasm-btor2"
task_class = "if-semantics"
difficulty = "T1"
oracle_provenance = "manual-proof"

[question]
text = """
Function 'main' takes one i32 parameter and executes a structured
if block: if the parameter is nonzero, a nop is executed; otherwise
the if body is skipped.  The block type is void ([] → []).
Neither branch has trap semantics.
Can the trap flag ever be set within bound 8 steps?
"""

[expected]
verdict = "unreachable"

[oracle]
status = "agreement"
bound = 8
cases_checked = 4

[notes]
text = """
Ground-truth seed for if/else structured control flow no-trap
reachability.  Validates the if-lowering: the BTOR2 dispatch layer
emits an ITE keyed on neq(condition, 0) selecting between pc+1
(true branch) and ins.alt (false target = instruction after end).

The WASM module is 41 bytes: one i32 param, body
'local.get 0; if (void); nop; end; end', one export named 'main'.
SHA-256 of module.wasm recorded in spec.json for cache validation.

Oracle cases (all unreachable):
  condition=0 (skip if body), condition=1 (enter if body),
  condition=-1 (nonzero, enter if body), condition=INT32_MAX (enter).
"""
