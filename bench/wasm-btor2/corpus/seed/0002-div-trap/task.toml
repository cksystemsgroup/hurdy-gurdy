[task]
id = "0002-div-trap"
pair = "wasm-btor2"
task_class = "trap-semantics"
difficulty = "T1"
oracle_provenance = "manual-proof"

[question]
text = """
Function 'main' takes two i32 parameters (dividend, divisor) and returns
their signed quotient via i32.div_s.
i32.div_s traps when the divisor is zero, and also when dividend is
INT32_MIN (-2^31) and divisor is -1 (signed overflow).
Can the trap flag ever be set within bound 8 steps?
"""

[expected]
verdict = "reachable"

[oracle]
status = "agreement"
bound = 8
cases_checked = 5

[notes]
text = """
Ground-truth seed for i32.div_s trap reachability. Unlike 0001-i32-add-wrap,
this task has a reachable trap: any call with divisor==0 triggers it at step 4
(local.get 0; local.get 1; i32.div_s fires trap; PC self-loops).

The WASM module is 42 bytes: two i32 params, body 'local.get 0; local.get 1;
i32.div_s; end', one export named 'main'. SHA-256 of module.wasm recorded
in spec.json for cache validation.

Witness: param_0 (dividend) = any, param_1 (divisor) = 0. Trap fires at
step 3 (0-indexed BMC cycle), validating the full P7→P8 pipeline: the
lifter extracts (divisor=0, trap_step=3) from the z3 model.

Also validates the signed-overflow path: param_0 = 0x80000000 (INT32_MIN),
param_1 = 0xFFFFFFFF (-1) also reaches trap at step 3.
"""
