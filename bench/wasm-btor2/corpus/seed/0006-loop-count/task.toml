[task]
id = "0006-loop-count"
pair = "wasm-btor2"
task_class = "loop-semantics"
difficulty = "T1"
oracle_provenance = "manual-proof"

[question]
text = """
Function 'main' takes one i32 parameter n and counts from 0 to n-1
using a block/loop/br_if/br pattern (while loop idiom).  A local
counter i starts at 0; the loop body checks i >= n via i32.ge_u and
exits via br_if 1 if true, otherwise increments i and branches back
to the loop head via br 0.  None of the instructions (i32.ge_u,
br_if, br, local.get/set, i32.const, i32.add) have trap semantics.
Can the trap flag ever be set within bound 8 steps?
"""

[expected]
verdict = "unreachable"

[oracle]
status = "agreement"
bound = 8
cases_checked = 4

[notes]
text = """
Ground-truth seed for br_if/br loop control flow no-trap reachability.
Validates the loop-pattern lowering: br_if emits ITE(neq(condition,0),
br_target, pc+1) and br emits an unconditional jump to ins.br_target
(pre-resolved by the decoder's second pass).

The WASM module is 63 bytes: one i32 param, one i32 local, body
'i32.const 0; local.set 1; block; loop; local.get 1; local.get 0;
i32.ge_u; br_if 1; local.get 1; i32.const 1; i32.add; local.set 1;
br 0; end; end; end', exported as 'main'.
SHA-256 of module.wasm recorded in spec.json for cache validation.

Oracle cases (all unreachable):
  n=0 (loop body never entered), n=1 (one iteration),
  n=2 (two iterations), n=3 (three iterations).
"""
