[task]
id = "0007-clz-no-trap"
pair = "wasm-btor2"
task_class = "bit-count-semantics"
difficulty = "T1"
oracle_provenance = "manual-proof"

[question]
text = """
Function 'main' takes one i32 parameter and returns i32.clz applied to it.
i32.clz counts leading zeros of a 32-bit unsigned integer value (clz(0)=32,
clz(0x80000000)=0, clz(1)=31).  The instruction has no trap semantics.
Can the trap flag ever be set within bound 8 steps?
"""

[expected]
verdict = "unreachable"

[oracle]
status = "agreement"
bound = 8
cases_checked = 4

[notes]
text = """
Ground-truth seed for i32.clz no-trap reachability.
Validates the ITE priority-encoder lowering: the translator encodes
clz(x) as a 32-deep ITE tree keyed on individual bit slices, with
the MSB check (bit 31) as the outermost ite (highest priority).

The WASM module is 39 bytes: one i32 param, one i32 result, body
'local.get 0; i32.clz; end', exported as 'main'.
SHA-256 of module.wasm recorded in spec.json for cache validation.

Oracle cases (all unreachable):
  n=0 (clz=32), n=1 (clz=31), n=0x80000000 (clz=0), n=0xFFFFFFFF (clz=0).
"""
