[task]
id = "0003-c-loopsum-o2"
task_class = "assertion-reachability"
difficulty = "T2"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
An AArch64 bare-metal C program sums i for i in [0, 10) into `sum` and
calls trap() if the result isn't 45. Compiled with aarch64-linux-gnu-gcc -O2.
Can the trap() function be reached?
"""

[expected]
verdict = "unreachable"

[c]
opt_level   = "2"
bound       = 60
gcc_version = "13.3.0-6ubuntu2~24.04.1"

[notes]
text = """
Loopsum at -O2: GCC may partially unroll or vectorise the loop;
volatile on n prevents full constant-folding. bound=60 is a
conservative estimate for the unrolled loop body.
source.elf must be compiled via:
  python bench/aarch64-btor2/corpus/_compile_c.py bench/aarch64-btor2/corpus/seed/0003-c-loopsum-o2
"""
