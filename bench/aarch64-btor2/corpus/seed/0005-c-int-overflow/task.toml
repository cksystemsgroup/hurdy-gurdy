[task]
id = "0005-c-int-overflow"
task_class = "assertion-reachability"
difficulty = "T2"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
An AArch64 bare-metal C program computes y = INT_MAX + 1 then widens
y to long z and traps if z != -2147483648. C's signed overflow is
undefined; on AArch64 the W-reg ADD wraps 32-bit two's-complement
and SXTW sign-extends to 64 bits, making the actual behaviour
explicit. Can the trap function be reached?
"""

[expected]
verdict = "unreachable"

[c]
opt_level   = "0"
bound       = 60
gcc_version = "13.3.0-6ubuntu2~24.04.1"

[notes]
text = """
Port of riscv-btor2 0115-c-int-overflow. On AArch64, `int + 1`
at -O0 uses ADD on a W-register (32-bit modular arithmetic), giving
0x80000000 = INT_MIN on overflow. C's signed int → long widening
compiles to SXTW, sign-extending to 0xFFFFFFFF80000000 = -2147483648L.
The lowering surface (W-reg wraparound + SXTW) replaces RV64's
addw + sign-extension; observable result is identical.
source.elf must be compiled via:
  python bench/aarch64-btor2/corpus/_compile_c.py bench/aarch64-btor2/corpus/seed/0005-c-int-overflow
"""
