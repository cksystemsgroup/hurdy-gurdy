[task]
id = "0011-c-mul32-truncation"
task_class = "assertion-reachability"
difficulty = "T2"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
An AArch64 bare-metal C program multiplies 0x10000 * 0x10000 (both int)
and traps if the result widened to long isn't 0. C says signed overflow
is UB; on AArch64 W-reg MUL computes the low 32 bits of the product
(= 0 for this case) and SXTW sign-extends to 64. Can the trap function
be reached?
"""

[expected]
verdict = "unreachable"

[c]
opt_level   = "0"
bound       = 60
gcc_version = "13.3.0-6ubuntu2~24.04.1"

[notes]
text = """
Port of riscv-btor2 0121-c-mulw-truncation. On AArch64, int * int
lowers to MUL Wd, Wn, Wm (W-register multiply = low 32 bits of
product). For 0x10000 * 0x10000 = 0x100000000, low 32 bits = 0.
SXTW sign-extends 0 to 64 bits → widened = 0. There is no MULW
equivalent on AArch64; the W-reg MUL provides the same 32-bit
truncation. Observable result is identical to RV64.
source.elf must be compiled via:
  python bench/aarch64-btor2/corpus/_compile_c.py bench/aarch64-btor2/corpus/seed/0011-c-mul32-truncation
"""
