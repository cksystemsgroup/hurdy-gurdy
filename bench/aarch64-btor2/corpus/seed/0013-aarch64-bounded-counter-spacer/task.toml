[task]
id = "0013-aarch64-bounded-counter-spacer"
task_class = "global-invariant"
difficulty = "T2"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
The program loops while x5 < 10, incrementing x5 by 1 each
iteration. With x5 = 0 at entry, can x5 ever hold a value strictly
greater than 10 at any cycle of execution?
"""

[expected]
verdict = "proved"

[asm]
assembler = "clang-18"
assembler_flags = "-target aarch64-linux-gnu -nostdlib -static -fuse-ld=lld -Wl,-e,_start -Wl,-Ttext=0x400000"
text_base = "0x400000"

[notes]
text = """
AArch64 port of riscv-btor2/0045-x5-bounded-counter-spacer. Same
logic: x5 counts from 0; Spacer proves x5 <= 10 is an inductive
invariant. AArch64 adaptation: B.LT instead of BLT; SVC #0 instead of
EBREAK. Companion to 0012: 0012 checks the lower bound (x5 >= 0),
0013 checks the upper bound (x5 <= 10).

The inductive invariant Spacer must find is: x5 <= 10 AND (loop
not yet exited → x5 < 10). BMC at any finite bound returns
unreachable — the weaker claim. Spacer returns proved.

Assembly layout (text base 0x400000):
  0x400000: add x5, x5, #1
  0x400004: mov x6, #10     (MOVZ encoding)
  0x400008: cmp x5, x6
  0x40000c: b.lt _start
  0x400010: svc #0
"""
