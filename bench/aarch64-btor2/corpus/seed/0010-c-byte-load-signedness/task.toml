[task]
id = "0010-c-byte-load-signedness"
task_class = "assertion-reachability"
difficulty = "T2"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
An AArch64 bare-metal C program loads the same byte (0xFF) through a
signed char and an unsigned char, widens both to int, and traps if the
results aren't -1 and 255 respectively. The compiler picks LDRSB
(sign-extending byte load) vs LDRB (zero-extending byte load) based on
the source operand's type. Can the trap function be reached?
"""

[expected]
verdict = "unreachable"

[c]
opt_level   = "0"
bound       = 80
gcc_version = "13.3.0-6ubuntu2~24.04.1"

[notes]
text = """
Port of riscv-btor2 0120-c-byte-load-signedness. AArch64 LDRSB
(sign-extending byte load) and LDRB (zero-extending byte load) are the
direct analogues of RV64 lb and lbu. Same C source, same observable
results, same verdict.
source.elf must be compiled via:
  python bench/aarch64-btor2/corpus/_compile_c.py bench/aarch64-btor2/corpus/seed/0010-c-byte-load-signedness
"""
