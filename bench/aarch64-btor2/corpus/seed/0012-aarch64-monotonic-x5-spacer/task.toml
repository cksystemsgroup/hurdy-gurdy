[task]
id = "0012-aarch64-monotonic-x5-spacer"
task_class = "global-invariant"
difficulty = "T2"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
The program loops while x5 < 8, incrementing x5 by 1 each iteration.
With x5 = 0 at entry, can x5 ever hold a signed-negative value at any
cycle of execution?
"""

[expected]
verdict = "proved"

[asm]
assembler = "clang-18"
assembler_flags = "-target aarch64-linux-gnu -nostdlib -static -fuse-ld=lld -Wl,-e,_start -Wl,-Ttext=0x400000"
text_base = "0x400000"

[notes]
text = """
AArch64 port of riscv-btor2/0020-monotonic-x5-spacer. Same logic:
x5 increments from 0 inside a loop; Spacer proves x5 >= 0 is an
inductive invariant. AArch64 adaptation: B.LT instead of BLT; SVC #0
instead of EBREAK; MOV (MOVZ) for immediate loads; CMP instead of
SUB-then-branch. Register x5 is index 5 in both ISAs.

Why z3-spacer: BMC at any finite bound would return unreachable (bad
not found within N cycles) — correct but weaker. Spacer synthesizes
the inductive invariant x5 >= 0 and returns proved, the unbounded
guarantee. The translator encodes the loop as a BTOR2 transition
system; Spacer encodes it as Horn clauses and finds the invariant.

Assembly layout (text base 0x400000):
  0x400000: add x5, x5, #1
  0x400004: mov x6, #8      (MOVZ encoding)
  0x400008: cmp x5, x6
  0x40000c: b.lt _start
  0x400010: mov x0, #0
  0x400014: svc #0
"""
