[task]
id = "0006-c-udiv-by-zero"
task_class = "assertion-reachability"
difficulty = "T2"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
An AArch64 bare-metal C program computes q = x / y where y is
volatile-zero (forcing divide-by-zero at runtime), then widens q to
unsigned long z and traps if z != 0. C says this is UB; on AArch64
UDIV returns 0 on division by zero (no trap, no hardware fault). Can
the trap function be reached?
"""

[expected]
verdict = "unreachable"

[c]
opt_level   = "0"
bound       = 60
gcc_version = "13.3.0-6ubuntu2~24.04.1"

[notes]
text = """
Port of riscv-btor2 0116-c-divu-sentinel, adapted for AArch64
divergence: UDIV div-by-zero → 0 (not the all-ones sentinel that
RV64 DIVU returns). The assertion is changed from `z != 0xFFFFFFFFUL`
to `z != 0UL` to match AArch64 semantics. Verdict stays unreachable.

This is the canonical AArch64-vs-RV64 divergence for unsigned
division by zero (SCHEMA.md §14). The BTOR2 lowering encodes UDIV
div-by-zero as ite(divisor == 0, 0, quotient) rather than the RV64
all-ones sentinel.
source.elf must be compiled via:
  python bench/aarch64-btor2/corpus/_compile_c.py bench/aarch64-btor2/corpus/seed/0006-c-udiv-by-zero
"""
