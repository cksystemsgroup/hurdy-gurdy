[task]
title = "gas-gated-sstore"
description = """
Contract where GAS (0x5A) is used to branch on the available gas.
PUSH1 0x00 / GAS / GT / PUSH1 0x08 / JUMPI / STOP / JUMPDEST / PUSH1 0x01 /
PUSH1 0x00 / SSTORE / STOP.

GAS pushes the remaining gas after its own cost deduction (gas - 2), which with
a 1,000,000 gas limit is always > 0. GT(gas_remaining, 0) = 1 unconditionally
so JUMPI is always taken, leading to SSTORE(0, 1).

Demonstrates P25: lower_gas pushes the post-deduction machine gas (bv64)
zero-extended to bv256. The GAS/GT/JUMPI combination is a gas-observability
pattern common in low-level contracts checking remaining gas before a call.

Opcode sequence (15 bytes):
  PUSH1 0x00 / GAS / GT / PUSH1 0x08 / JUMPI / STOP /
  JUMPDEST / PUSH1 0x01 / PUSH1 0x00 / SSTORE / STOP

Path analysis:
  pc=0: PUSH1 0x00 → stack[0]=0
  pc=2: GAS → stack[1]=(gas-2); gas=1,000,000 → pushes 999,995 (after costs so far)
  pc=3: GT(999995, 0) = 1 → stack[0]=1
  pc=4: PUSH1 0x08 → stack[1]=8
  pc=6: JUMPI(dest=8, cond=1) → jump always taken
  pc=8: JUMPDEST
  pc=9: PUSH1 0x01 / PUSH1 0x00 / SSTORE(slot=0, val=1) / STOP → bad fires at step 9.
"""
expected_verdict = "sat"
notes = """
Ground truth: SAT. With GasLimitPin=1,000,000, GAS always pushes a large
positive value; GT(large, 0) = 1 unconditionally, so the branch is always
taken and SSTORE(0,1) is always reached.

SAT witness: unconditional — no symbolic input needed.

Gas budget: 3 (PUSH1) + 2 (GAS) + 3 (GT) + 3 (PUSH1) + 10 (JUMPI)
            + 1 (JUMPDEST) + 3 (PUSH1) + 3 (PUSH1) + 20000 (SSTORE cold)
            + 0 (STOP) = 20028. Well within 1,000,000 limit.

BMC bound=12 is sufficient: bad fires at step 9 (0-indexed).
"""
