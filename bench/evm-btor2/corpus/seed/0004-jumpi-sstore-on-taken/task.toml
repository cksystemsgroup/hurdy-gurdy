[task]
title = "jumpi-sstore-on-taken"
description = """
Contract that reads calldata[0..31] as a bv256 condition and, if it is
non-zero, jumps to a JUMPDEST that stores the constant 0x42 (66) to
storage slot 0 and halts with STOP.  If the condition is zero the
contract falls through directly to STOP without any storage write.
Tests that the solver can find a calldata witness to reach the
storage_eq property on the taken branch only.

Opcode sequence (14 bytes):
  PUSH1 0x00 / CALLDATALOAD / PUSH1 0x07 / JUMPI / STOP /
  JUMPDEST / PUSH1 0x42 / PUSH1 0x00 / SSTORE / STOP
"""
expected_verdict = "sat"
notes = """
Ground truth: SAT.  The solver must find any calldata[0..31] != 0 (e.g.
the big-endian word 1) to make JUMPI take the branch to PC=7 where the
SSTORE writes sto[0]=0x42.  With calldata all-zero the JUMPI falls
through to STOP and the property is unreachable in that run, so this
corpus task exercises the split-path solver search.  BMC bound=10 is
sufficient: the taken path is 7 instructions long.
"""
