[task]
title = "msize-gated-sstore"
description = """
Contract where MSIZE (0x59) is used to branch on whether memory has been touched.
PUSH1 0x00 / PUSH1 0x00 / MSTORE8 / MSIZE / PUSH1 0x00 / LT /
PUSH1 0x0d / JUMPI / STOP / JUMPDEST / PUSH1 0x01 / PUSH1 0x00 / SSTORE / STOP.

MSTORE8 writes 0 to offset 0, expanding mem_words from 0 to 1.
MSIZE pushes mem_words * 32 = 32 (bv256). LT(0, 32) = 1 → JUMPI taken
→ SSTORE(slot=0, val=1) → STOP → bad fires.

Opcode sequence (20 bytes):
  PUSH1 0x00 / PUSH1 0x00 / MSTORE8 / MSIZE / PUSH1 0x00 / LT /
  PUSH1 0x0d / JUMPI / STOP / JUMPDEST / PUSH1 0x01 / PUSH1 0x00 /
  SSTORE / STOP

Path analysis:
  pc=0:  PUSH1 0x00 → stack[0]=0 (value for MSTORE8)
  pc=2:  PUSH1 0x00 → stack[1]=0 (offset for MSTORE8, TOS)
  pc=4:  MSTORE8(offset=0, val=0) → mem[0]=0, mem_words=1, sp=0
  pc=5:  MSIZE → stack[0]=32 (= 1 * 32)
  pc=6:  PUSH1 0x00 → stack[1]=0 (TOS)
  pc=8:  LT(0, 32) = 1 → stack[0]=1
  pc=9:  PUSH1 0x0d → stack[1]=13 (TOS)
  pc=11: JUMPI(dest=13, cond=1) → jump taken, sp=0, pc=13
  pc=13: JUMPDEST
  pc=14: PUSH1 0x01 / PUSH1 0x00 / SSTORE(slot=0, val=1) / STOP → bad fires at step 12.
"""
expected_verdict = "sat"
notes = """
Ground truth: SAT. MSTORE8 at offset 0 expands memory by 1 word (mem_words 0→1).
MSIZE = mem_words * 32 = 32. LT(0, 32) = 1 is unconditional after the write.
JUMPI is always taken, leading to SSTORE(0, 1) and STOP.

Demonstrates P28: lower_msize pushes mem_words * 32 — the current memory size in
bytes — as a bv256 value. MSIZE is used here as a cheap way to detect memory
expansion, a pattern found in dynamic dispatch and memory sentinel idioms.

Gas budget: 3 (PUSH1) + 3 (PUSH1) + 3 (MSTORE8) + mem_expand(1 word) + 2 (MSIZE)
            + 3 (PUSH1) + 3 (LT) + 3 (PUSH1) + 10 (JUMPI) + 1 (JUMPDEST)
            + 3 (PUSH1) + 3 (PUSH1) + 20000 (SSTORE cold) + 0 (STOP)
            = ~20038 + memory expansion. Well within 1,000,000 limit.

Memory expansion for 1 word: Cmem(1) - Cmem(0) = (3*1 + 1^2/512) - 0 = 3 gas.

BMC bound=15 is sufficient: bad fires at step 12 (0-indexed).
"""
