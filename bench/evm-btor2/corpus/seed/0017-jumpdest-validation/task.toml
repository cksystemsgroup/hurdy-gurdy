[task]
title = "jumpdest-validation"
description = """
Contract where the only JUMPI target (pc=7) is a PUSH1 opcode, not a
JUMPDEST (0x5b). With correct JUMPDEST validation the JUMPI traps when
the condition is true; without validation it would execute the PUSH1/SSTORE
sequence and falsely claim SAT.

Demonstrates P20: lower_jumpi now receives the jumpdest_set collected from
the bytecode, and raises invalid-destination trap when cond!=0 and dest is
not in that set. There are NO JUMPDEST bytes (0x5b) in this bytecode, so
any conditional jump is invalid.

Opcode sequence (13 bytes):
  PUSH1 0x00 / CALLDATALOAD / PUSH1 0x07 / JUMPI / STOP /
  PUSH1 0x01 / PUSH1 0x00 / SSTORE / STOP

The SSTORE sequence at pc7 is NOT reachable via a valid jump because
pc7 is a PUSH1 byte, not a JUMPDEST. Any non-zero calldata would cause
JUMPI to trap; zero calldata falls through to STOP.
"""
expected_verdict = "unsat"
notes = """
Ground truth: UNSAT. No valid execution path reaches SSTORE.

Paths (with JUMPDEST validation):
  calldata=0:  JUMPI cond=0 → fall-through → STOP (pc6) → halted=1, trap=0
               bad: sto[0]!=1 → UNSAT.
  calldata≠0: JUMPI cond=1, dest=7 (PUSH1 — NOT JUMPDEST) → invalid_dest trap
               → trap=1, halted=1; bad requires ¬trap → UNSAT.

Without validation (incorrect): calldata≠0 → JUMPI jumps to pc7 →
  PUSH1 1 / PUSH1 0 / SSTORE(0,1) → sto[0]=1 → would falsely fire bad.

BMC bound=10 is sufficient: all paths terminate in ≤ 7 steps.
"""
