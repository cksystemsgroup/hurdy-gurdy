description = "TSTORE/TLOAD-gated SSTORE (P30 — EIP-1153 transient storage)"

# Bytecode (22 bytes):
#   0x00 PUSH1 0x01    push value 1
#   0x02 PUSH1 0x00    push key 0 (TOS)
#   0x04 TSTORE        transient_sto[0] = 1; sp=0
#   0x05 PUSH1 0x00    push key 0
#   0x07 TLOAD         push transient_sto[0] = 1; sp=1
#   0x08 PUSH1 0x01    push 1
#   0x0a EQ            1 == 1 → 1; sp=1
#   0x0b PUSH1 0x0f    push destination 15
#   0x0d JUMPI         cond=1 → jump to 0x0f; sp=0
#   0x0e STOP          (not taken)
#   0x0f JUMPDEST
#   0x10 PUSH1 0x01    push value 1
#   0x12 PUSH1 0x00    push slot 0
#   0x14 SSTORE        sto[0] = 1
#   0x15 STOP          bad fires (storage_eq slot=0 value=1)

# Analysis:
#   TSTORE writes 1 to transient slot 0. TLOAD reads it back → 1.
#   EQ(1, 1) = 1 → JUMPI is unconditionally taken.
#   SSTORE sets persistent storage slot 0 = 1 → bad fires at step 13.

# Gas budget:
#   3× PUSH1 = 3 gas each = 9
#   TSTORE = 100, TLOAD = 100
#   EQ, JUMPI, JUMPDEST, SSTORE (cold=20000), STOP
#   Total ≈ 20240 gas (well within GasLimitPin 1000000)
