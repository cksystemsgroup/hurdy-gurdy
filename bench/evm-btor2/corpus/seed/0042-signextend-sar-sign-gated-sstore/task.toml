description = "SIGNEXTEND(0, calldata_word) then SAR(1) gates SSTORE on sign bit — SAT when calldata[31] ∈ 128..255"

# Bytecode (23 bytes):
#   0x00 PUSH1 0x00    — calldata offset
#   0x02 CALLDATALOAD  — load 256-bit word from calldata[0..31]
#   0x03 PUSH1 0x00    — bytenum = 0 (sign-extend lowest byte)
#   0x05 SIGNEXTEND    — TOS=bytenum=0, NOS=word; replicate bit 7 of LSB through all high bits
#   0x06 PUSH1 0x01    — shift amount = 1
#   0x08 SAR           — arithmetic right shift by 1 (sign-preserving divide-by-2)
#   0x09 PUSH1 0x00    — push 0 for signed comparison
#   0x0b SGT           — TOS=0, NOS=sar_result; 1 if 0 > sar_result (= sar_result < 0, signed)
#   0x0c PUSH1 0x10    — jump destination = 16 (0x10)
#   0x0e JUMPI         — taken if SAR result is negative
#   0x0f STOP          — not-taken (calldata[31] ∈ 0..127 → non-negative, SAR ≥ 0)
#   0x10 JUMPDEST
#   0x11 PUSH1 0x01    — value = 1
#   0x13 PUSH1 0x00    — slot = 0
#   0x15 SSTORE        — sto[0] = 1 → bad fires
#   0x16 STOP

# SIGNEXTEND semantics (EVM Yellow Paper §H):
#   SIGNEXTEND(b, x): sign-extend x treating bit (b*8+7) as the sign bit.
#   For b=0: treat bit 7 of the lowest byte as sign bit.
#   If bit 7 of (x & 0xFF) is set → set all bits above bit 7 to 1.
#   Stack order: TOS=b (bytenum), NOS=x (value) — push value first, then bytenum.

# SAR semantics (EIP-145, London EVM):
#   SAR(shift, x): arithmetic right shift; preserves the sign (MSB) of x.
#   For shift=1: equivalent to signed division by 2 (rounded toward -infinity).
#   A negative input → negative output. Stack order: TOS=shift, NOS=x.

# SGT semantics:
#   SGT(a, b): a = TOS, b = NOS; push 1 if a > b (signed).
#   SGT(TOS=0, NOS=sar_result): push 1 if 0 > sar_result = sar_result < 0.

# SAT condition: calldata[31] ∈ 128..255 (bit 7 of the LSB is set)
#   SIGNEXTEND(0, word) → 0xFFFF...FF{byte} (all high bits = 1, negative)
#   SAR(1, negative) → still negative (arithmetic shift preserves MSB)
#   SGT(TOS=0, NOS=sar_result): 0 > negative = 1 → JUMPI taken → bad fires at step 14.

# UNSAT condition: calldata[31] ∈ 0..127 (bit 7 clear)
#   SIGNEXTEND(0, word) → 0x0000...00{byte} (non-negative)
#   SAR(1, non-negative) → non-negative
#   SGT(TOS=0, NOS=sar_result): 0 > non-negative = 0 → JUMPI not taken → bad never fires.

# Witness: calldata[31] = 0x80 (128) — minimum negative int8.
#   Stack trace:
#     step 0:  PUSH1 0x00 → [0]
#     step 1:  CALLDATALOAD(0) → [word] (word = 0x...0080)
#     step 2:  PUSH1 0x00 → [word, 0]
#     step 3:  SIGNEXTEND(0, word) → [0xFFFF...FF80]  (bit 7 of 0x80 is set)
#     step 4:  PUSH1 0x01 → [0xFFFF...FF80, 1]
#     step 5:  SAR(1, 0xFFFF...FF80) → [0xFFFF...FFC0]  (arithmetic shift, MSB stays 1)
#     step 6:  PUSH1 0x00 → [0xFFFF...FFC0, 0]
#     step 7:  SGT(TOS=0, NOS=0xFFFF...FFC0) → 0 > 0xFFFF...FFC0 (signed) → 1 → [1]
#     step 8:  PUSH1 0x10 → [1, 16]
#     step 9:  JUMPI(dest=16, cond=1) → pc=16
#     step 10: JUMPDEST at pc=16
#     step 11: PUSH1 0x01 → [1]
#     step 12: PUSH1 0x00 → [1, 0]
#     step 13: SSTORE(slot=0, value=1) → sto[0]=1
#     step 14: STOP → halted → bad fires at step 14

# Gas budget (SAT path):
#   PUSH1×7=21, CALLDATALOAD=3, SIGNEXTEND=5, SAR=3, SGT=3, JUMPI=10,
#   JUMPDEST=1, SSTORE(cold)=20000, STOP=0  →  total ≈ 20046 gas (< 1_000_000)
