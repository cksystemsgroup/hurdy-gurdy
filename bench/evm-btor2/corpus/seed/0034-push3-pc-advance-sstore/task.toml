description = "PUSH3-pc-advance SSTORE (P37 — PUSH-range completeness)"

# Bytecode (8 bytes):
#   0x00 PUSH3 0x00 0x00 0x01   push 1 as a 3-byte immediate; pc advances by 4
#   0x04 PUSH1 0x00             push slot 0 (TOS)
#   0x06 SSTORE                 SSTORE(slot=0, val=1); sto[0]=1
#   0x07 STOP                   bad fires (storage_eq slot=0 value=1)

# Analysis:
#   PUSH3 (0x62) uses a 3-byte immediate, advancing pc by 4 (opcode + 3 bytes).
#   If the translator incorrectly used pc += 3, the 0x01 byte at offset 3 would
#   be decoded as PUSH1 0x60, placing subsequent bytes at wrong positions and
#   causing a trap rather than SSTORE reaching storage slot 0.
#   bad fires at step 3 (after SSTORE), confirming correct multi-byte parsing
#   and pc advancement. Complements seed 0029 (PUSH2) with the PUSH3 variant.

# Gas budget:
#   PUSH3 = 3, PUSH1 = 3, SSTORE (cold=20000), STOP = 0
#   Total ≈ 20006 gas (within GasLimitPin 1000000)
