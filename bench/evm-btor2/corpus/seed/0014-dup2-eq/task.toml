[task]
title = "dup2-eq"
description = """
Contract that pushes a reference value 1, loads calldata, then uses DUP2 to
duplicate the reference value and compares with EQ.  If calldata word equals 1,
stores 1 to storage slot 0. Otherwise falls through to STOP.

Exercises DUP2 (opcode 0x81), which copies the element at stack depth 2 onto
the top of the stack. This demonstrates that lower_dupn correctly reads
stack[sp-n] and writes a copy to stack[sp] with sp += 1.

Opcode sequence (16 bytes):
  PUSH1 0x01 / PUSH1 0x00 / CALLDATALOAD / DUP2 /
  EQ / PUSH1 0x0b / JUMPI / STOP / JUMPDEST /
  PUSH1 0x00 / SSTORE / STOP

Stack layout after DUP2: [1, cd, 1] — copy of the reference 1 is TOS;
EQ(TOS=1, NOS=cd) = 1 iff cd == 1; JUMPI taken iff calldata[0..31] == 1.
After JUMPI: stack=[1], then PUSH1 0x00 → [1, 0], SSTORE(slot=0, value=1).
"""
expected_verdict = "sat"
notes = """
Ground truth: SAT.  Minimum witness: calldata[31]=1 → EQ(1,1)=1 → JUMPI taken.

Stack trace (calldata[31]=1, all other bytes = 0):
  step 0:  PUSH1 0x01 → [1], sp=1
  step 1:  PUSH1 0x00 → [1, 0], sp=2
  step 2:  CALLDATALOAD(0) → [1, 1], sp=2  (TOS=calldata[0..31]=1)
  step 3:  DUP2 → [1, 1, 1], sp=3  (copies stack[sp-2]=stack[0]=1)
  step 4:  EQ(TOS=1, NOS=1) = 1 → [1, 1], sp=2
  step 5:  PUSH1 0x0b → [1, 1, 11], sp=3
  step 6:  JUMPI(dest=11, cond=1) → pc=11, sp=1
  step 7:  JUMPDEST at pc=11 → pc=12
  step 8:  PUSH1 0x00 → [1, 0], sp=2
  step 9:  SSTORE(slot=0, value=1) → sto[0]=1, sp=0
  step 10: STOP → halted=1 → bad fires (sto[0]==1 ∧ halted ∧ ¬trap)

Without witness (calldata=0): DUP2 copies 1, EQ(1, 0)=0 → JUMPI falls
through → UNSAT.

BMC bound=15 is sufficient: taken path has 11 steps (witness_step=10).
"""
