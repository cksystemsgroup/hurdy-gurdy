[task]
title = "revert-trap"
description = """
Contract where REVERT (0xFD) guards the fall-through path: if calldata is
zero the JUMPI falls through to two PUSH1s and REVERT, terminating with
trap=1 and halted=1 but WITHOUT draining all gas. If calldata is non-zero
the JUMPI takes the branch to JUMPDEST and SSTORE(0, 1) is executed.

Demonstrates P22: lower_revert sets trap=1 and halted=1 on execution, but
unlike lower_invalid it does NOT drain gas to zero. The REVERT on the
fall-through path means the storage write is only reachable via non-zero
calldata; it also provides return data (offset=0, length=0 here).

Opcode sequence (18 bytes):
  PUSH1 0x00 / CALLDATALOAD / PUSH1 0x0b / JUMPI /
  PUSH1 0x00 / PUSH1 0x00 / REVERT /
  JUMPDEST / PUSH1 0x01 / PUSH1 0x00 / SSTORE / STOP

Path analysis:
  calldata=0  : JUMPI cond=0 → fall-through to pc6; PUSH1 0/PUSH1 0/REVERT
                → trap=1, halted=1 (gas unchanged); bad requires ¬trap → UNSAT.
  calldata≠0  : JUMPI cond≠0, dest=11 (JUMPDEST) → PUSH1 1/PUSH1 0/SSTORE(0,1)
                → STOP → halted=1, trap=0, sto[0]=1 → bad fires at step 8.
"""
expected_verdict = "sat"
notes = """
Ground truth: SAT. The non-zero calldata path reaches SSTORE(0,1) then STOP.

SAT witness: calldata[31]=1 → JUMPI taken → SSTORE(0,1) → STOP.
Execution steps to bad: 9 instructions (bad_fired_at=8, 0-indexed).

The REVERT on the fall-through path never causes a false SAT: any execution
with calldata=0 reverts with trap=1, and the storage_eq bad node requires
¬trap, so that path contributes only UNSAT.

Key distinction from seed 0018 (INVALID): REVERT does not consume all gas —
the remaining gas after REVERT is the same as before (no expansion gas for
offset=0, length=0). This distinguishes the "explicit revert" semantic from
the "invalid instruction" semantic.

BMC bound=10 is sufficient: the longest path to bad is 9 instructions.
"""
