description = "PUSH2-value SSTORE (P32 — multi-byte PUSH immediate)"

# Bytecode (7 bytes):
#   0x00 PUSH2 0x00 0x01   push 1 as a 2-byte immediate; pc advances by 3
#   0x03 PUSH1 0x00        push slot 0 (TOS)
#   0x05 SSTORE            SSTORE(slot=0, val=1); sto[0]=1
#   0x06 STOP              bad fires (storage_eq slot=0 value=1)

# Analysis:
#   PUSH2 (0x61) uses a 2-byte immediate, advancing pc by 3 (opcode + 2
#   bytes). If the translator incorrectly used pc += 2 (PUSH1 advance),
#   the 0x01 byte at offset 2 would be decoded as PUSH1 0x60, placing
#   subsequent bytes at wrong positions and causing a trap.
#   The property fires at step 3 (after STOP), demonstrating correct
#   multi-byte immediate parsing and pc advancement.

# Gas budget:
#   PUSH2 = 3, PUSH1 = 3, SSTORE (cold=20000), STOP = 0
#   Total ≈ 20006 gas (within GasLimitPin 1000000)
