description = "CALL stub — pessimistic failure, unconditional SSTORE reachable after CALL (P40)"

# Bytecode (22 bytes):
#   0x00 PUSH1 0x00  \
#   0x02 PUSH1 0x00   |
#   0x04 PUSH1 0x00   |  7 × PUSH1 0 = 14 bytes
#   0x06 PUSH1 0x00   |  (retLen, retOff, argsLen, argsOff, value, to, gas)
#   0x08 PUSH1 0x00   |
#   0x0a PUSH1 0x00   |
#   0x0c PUSH1 0x00  /
#   0x0e CALL (0xF1) — pops 7, pushes 0 (pessimistic stub: always failure)
#   0x0f POP (0x50)  — discard call result
#   0x10 PUSH1 0x01  — value = 1
#   0x12 PUSH1 0x00  — slot = 0
#   0x14 SSTORE      — sto[0] = 1  → bad fires
#   0x15 STOP

# Key property: the SSTORE is unconditional (does not depend on CALL result).
# The CALL stub pushes 0 (failure) and then POP discards it, so SSTORE
# always executes. This verifies that the CALL stub correctly passes control
# to subsequent opcodes without trapping.
#
# SAT witness: any input → SSTORE(0,1) fires at step 12.
# bad_fired_at = 12 (0-indexed): 7 PUSH1s + CALL + POP + 2 PUSH1s + SSTORE.

# Gas budget:
#   7 × PUSH1 = 21, CALL stub = 700, POP = 2, 2 × PUSH1 = 6, SSTORE cold = 20000
#   Total = 20729 gas (within GasLimitPin 1000000)
