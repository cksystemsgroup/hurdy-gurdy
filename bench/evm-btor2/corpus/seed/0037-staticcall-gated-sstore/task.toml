description = "STATICCALL-gated SSTORE — pessimistic stub always fails so SSTORE is unreachable (UNSAT)"

# Bytecode (24 bytes):
#   0x00 PUSH1 0x00 (×6 = offsets 0-11) — 6 zeros for STATICCALL args
#   0x0c STATICCALL (0xFA) — pops 6, pushes 0 (stub: always failure)
#   0x0d PUSH1 0x11 — jump destination 17 = 0x11
#   0x0f JUMPI — cond = STATICCALL result = 0 → NOT taken
#   0x10 STOP — halt; bad never fires
#   0x11 JUMPDEST
#   0x12 PUSH1 0x01 — value = 1
#   0x14 PUSH1 0x00 — slot = 0
#   0x16 SSTORE — sto[0] = 1 → bad fires (but unreachable)
#   0x17 STOP

# Key property: the SSTORE is on the success-path of STATICCALL.  With the
# pessimistic stub (always push 0), JUMPI is never taken and SSTORE is
# unreachable.  This is an UNSAT task with the current stub.
#
# UNSAT: stub pushes 0 → JUMPI cond=0 → fall through → STOP at pc=0x10.
# (A real STATICCALL might succeed, making this SAT — but the stub is
# conservative: it reports UNSAT until a proper inter-contract model is added.)

# Gas budget (not-taken path):
#   6 × PUSH1 = 18, STATICCALL stub = 700, PUSH1 = 3, JUMPI = 10, STOP = 0
#   Total ≈ 731 gas (within GasLimitPin 1000000)
