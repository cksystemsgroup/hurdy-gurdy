[task]
title = "div-sstore-on-taken"
description = """
Contract that reads calldata[0..31] as a bv256 value (x), pushes a
denominator (2), then pushes x on top and executes DIV → x/2 (integer
division).  If the quotient is greater than 10 (using GT), the contract
jumps to a JUMPDEST that stores 0x42 (66) to storage slot 0 and halts.
Otherwise it falls through to STOP without any storage write.

Models a pre-0.8 Solidity ratio-check pattern where an integer division
gates a storage write:
  if (x / 2 > 10) { storage[0] = 0x42; }

Opcode sequence (20 bytes):
  PUSH1 0x0a / PUSH1 0x02 / PUSH1 0x00 / CALLDATALOAD / DIV /
  GT / PUSH1 0x0d / JUMPI / STOP /
  JUMPDEST / PUSH1 0x42 / PUSH1 0x00 / SSTORE / STOP
"""
expected_verdict = "sat"
notes = """
Ground truth: SAT.  The solver must find calldata[0..31] such that
floor(calldata_word / 2) > 10, i.e., calldata_word >= 22.
Witness: calldata[31]=22 → 22/2=11 > 10.

Stack at each step (calldata[31]=22, x=22):
  pc=0:  PUSH1 0x0a → [10]
  pc=2:  PUSH1 0x02 → [10, 2]
  pc=4:  PUSH1 0x00 → [10, 2, 0]
  pc=6:  CALLDATALOAD → [10, 2, 22]
  pc=7:  DIV  TOS=22, NOS=2 → 22/2=11 → [10, 11]
  pc=8:  GT   TOS=11, NOS=10 → 11>10=1 → [1]
  pc=9:  PUSH1 0x0d → [1, 13]
  pc=11: JUMPI cond=1 → jump to pc=13
  pc=13: JUMPDEST
  pc=14: PUSH1 0x42 → [0x42]
  pc=16: PUSH1 0x00 → [0x42, 0]
  pc=18: SSTORE slot=0 value=0x42 → sto[0]=0x42
  pc=19: STOP → halted=1
  Bad fires at witness_step=12.

Without witness (calldata=0): 0/2=0, 0>10=false, JUMPI falls through →
STOP without SSTORE → storage_eq property unreachable → UNSAT.

BMC bound=20 is sufficient: taken path has 13 steps (witness_step=12).
"""
