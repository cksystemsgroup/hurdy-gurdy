description = "SWAP1-corrects-push-order SSTORE (P31 — SWAP1 stack manipulation)"

# Bytecode (7 bytes):
#   0x00 PUSH1 0x00    push slot 0 (buried below value after next push)
#   0x02 PUSH1 0x01    push value 1 (TOS); stack = [slot=0 (NOS), value=1 (TOS)]
#   0x04 SWAP1         exchange TOS and NOS: TOS→slot=0, NOS→value=1
#   0x05 SSTORE        SSTORE(slot=TOS=0, val=NOS=1) → sto[0] = 1
#   0x06 STOP          bad fires (storage_eq slot=0 value=1)

# Analysis:
#   Without SWAP1, SSTORE would see slot=1 (value pushed last) and val=0
#   (slot pushed first), writing sto[1]=0 — property never fires.
#   SWAP1 corrects the push order so slot=0 and val=1 are in the right
#   positions for SSTORE.
#   bad fires at step 4 (sto[0]=1 established after step 3 SSTORE).

# Gas budget:
#   2× PUSH1 = 2×3 = 6
#   SWAP1 = 3
#   SSTORE (cold=20000)
#   STOP = 0
#   Total ≈ 20009 gas (within GasLimitPin 1000000)
