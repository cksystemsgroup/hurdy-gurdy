[task]
title = "invalid-trap"
description = """
Contract where INVALID (0xFE) guards the fall-through path: if calldata is
zero the JUMPI falls through to INVALID, trapping the execution. If calldata
is non-zero the JUMPI takes the branch to JUMPDEST and SSTORE(0, 1) is
executed.

Demonstrates P21: lower_invalid unconditionally sets trap=1, halted=1, and
drains gas to zero when executed. The INVALID on the fall-through path means
the storage write is only reachable via non-zero calldata.

Opcode sequence (14 bytes):
  PUSH1 0x00 / CALLDATALOAD / PUSH1 0x07 / JUMPI /
  INVALID /
  JUMPDEST / PUSH1 0x01 / PUSH1 0x00 / SSTORE / STOP

Path analysis:
  calldata=0  : JUMPI cond=0 → fall-through to pc6 (INVALID) → trap=1, halted=1
                bad requires ¬trap → UNSAT on this path.
  calldata≠0  : JUMPI cond≠0, dest=7 (JUMPDEST) → PUSH1 1 / PUSH1 0 / SSTORE(0,1)
                → STOP → halted=1, trap=0, sto[0]=1 → bad fires at step 8.
"""
expected_verdict = "sat"
notes = """
Ground truth: SAT. The non-zero calldata path reaches SSTORE(0,1) then STOP.

SAT witness: calldata[31]=1 → JUMPI taken → SSTORE(0,1) → STOP.
Execution steps to bad: 9 instructions (bad_fired_at=8, 0-indexed).

The INVALID on the fall-through path never causes a false SAT: any execution
with calldata=0 traps at INVALID (trap=1) and the storage_eq bad node
requires ¬trap, so that path contributes only UNSAT.

BMC bound=10 is sufficient: the longest path to bad is 9 instructions.
"""
