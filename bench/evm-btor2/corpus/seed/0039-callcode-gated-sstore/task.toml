description = "CALLCODE-gated SSTORE — pessimistic stub always fails so SSTORE is unreachable (UNSAT)"

# Bytecode (26 bytes):
#   0x00 PUSH1 0x00 (×7 = offsets 0-13) — 7 zeros for CALLCODE args
#   0x0e CALLCODE (0xF2) — pops 7, pushes 0 (stub: always failure)
#   0x0f PUSH1 0x13 — jump destination 19 = 0x13
#   0x11 JUMPI — cond = CALLCODE result = 0 → NOT taken
#   0x12 STOP — halt; bad never fires
#   0x13 JUMPDEST
#   0x14 PUSH1 0x01 — value = 1
#   0x16 PUSH1 0x00 — slot = 0
#   0x18 SSTORE — sto[0] = 1 → bad fires (but unreachable)
#   0x19 STOP

# Key property: the SSTORE is on the success-path of CALLCODE.  With the
# pessimistic stub (always push 0), JUMPI is never taken and SSTORE is
# unreachable.  This is an UNSAT task with the current stub.
#
# UNSAT: stub pushes 0 → JUMPI cond=0 → fall through → STOP at pc=0x12.
# (A real CALLCODE might succeed, making this SAT — but the stub is
# conservative: it reports UNSAT until a proper inter-contract model is added.)
#
# CALLCODE pops 7 args (gas, to, value, argsOffset, argsLen, retOffset, retLen),
# same as CALL. Net stack effect: sp -= 6 (pop 7, push 1 result = 0).

# Gas budget (not-taken path):
#   7 × PUSH1 = 21, CALLCODE stub = 700, PUSH1 = 3, JUMPI = 10, STOP = 0
#   Total ≈ 734 gas (within GasLimitPin 1000000)
