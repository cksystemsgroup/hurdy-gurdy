description = "LOG1 followed by SSTORE (P34 — LOG event opcodes)"

# Bytecode (13 bytes):
#   0x00 PUSH1 0x00    push topic 0 (deepest)
#   0x02 PUSH1 0x00    push size 0
#   0x04 PUSH1 0x00    push offset 0 (TOS)
#   0x06 LOG1          emit LOG1(offset=0, size=0, topic=0); sp-=3; gas-=750
#   0x07 PUSH1 0x01    push value 1
#   0x09 PUSH1 0x00    push slot 0 (TOS)
#   0x0b SSTORE        sto[0] = 1
#   0x0c STOP          bad fires (storage_eq slot=0 value=1)

# Analysis:
#   LOG1 emits an event with 0-byte data and 1 topic; sp decrements by 3
#   (offset + size + 1 topic). Gas = 375 (base) + 0 (data) + 375 (topic) = 750.
#   After LOG1, the remaining PUSH1/PUSH1/SSTORE sequence stores 1 to slot 0.
#   Bad fires at step 7 (STOP).

# Gas budget:
#   3× PUSH1 = 9
#   LOG1 (base=375 + topic=375) = 750
#   2× PUSH1 = 6
#   SSTORE (cold=2200) = 2200
#   Total ≈ 2965 gas (within GasLimitPin 1000000)
