description = "SHA3/KECCAK256 then SSTORE (P35 — symbolic hash opcode)"

# Bytecode (9 bytes):
#   0x00 PUSH1 0x20    size = 32 (deepest on stack)
#   0x02 PUSH1 0x00    offset = 0 (TOS)
#   0x04 SHA3          keccak256(mem[0..31]) → symbolic bv256; sp=1
#   0x05 PUSH1 0x00    slot = 0 (TOS)
#   0x07 SSTORE        sto[0] = symbolic_hash; sp=0; cold gas=2200
#   0x08 STOP          bad fires (stop property)

# Analysis:
#   SHA3 (0x20) hashes 32 bytes of memory starting at offset 0.
#   The result is modeled as an unconstrained symbolic bv256 value (BTOR2 input
#   node), which is sound but over-approximate: the solver can choose any hash.
#   After SHA3, the hash value is stored in slot 0 via cold SSTORE.
#   Bad (stop property) fires when STOP executes at step 5 (0-indexed).

# Gas budget:
#   2× PUSH1 = 6
#   SHA3 (base=30 + 1 word=6 + Cmem word0→1=3) = 39
#   PUSH1 = 3
#   SSTORE cold = 2200
#   Total ≈ 2248 gas (within GasLimitPin 1000000)
