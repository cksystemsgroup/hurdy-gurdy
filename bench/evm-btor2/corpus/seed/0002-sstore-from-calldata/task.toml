[task]
title = "sstore-from-calldata"
description = """
Contract that reads the first 32 bytes of calldata as a big-endian bv256
value and writes it unconditionally to storage slot 0, then halts with STOP.
Tests the storage_eq reach property where the witness requires a specific
symbolic calldata input.

Opcode sequence: PUSH1 0x00 / CALLDATALOAD / PUSH1 0x00 / SSTORE / STOP
"""
expected_verdict = "sat"
notes = """
Ground truth: SAT with witness calldata[0..31] = 0x00..01 (big-endian 1).
The solver must find a free-calldata assignment that satisfies sto[0]==1.
CalldatasizePin(32) is not needed — CALLDATALOAD zero-pads past the end.
"""
