[task]
title = "sdiv-gt"
description = """
Contract that loads a calldata word, divides it by 3 (SDIV), then
checks if the result is greater than 2 (LT with arguments swapped).
If so, it stores 1 to storage slot 0 and halts.  Otherwise it falls
through to STOP without any storage write.

Models a signed-division + threshold check pattern:
  int256 x = int256(abi.decode(calldata, uint256));
  if (x / 3 > 2) { storage[0] = 1; }

Stack layout: PUSH1 0x03 places 3 as NOS; CALLDATALOAD then places
the calldata word as TOS, so SDIV(a=TOS=calldata, b=NOS=3) computes
calldata/3 (signed).

Opcode sequence (20 bytes):
  PUSH1 0x03 / PUSH1 0x00 / CALLDATALOAD / SDIV /
  PUSH1 0x02 / LT / PUSH1 0x0d / JUMPI / STOP /
  JUMPDEST / PUSH1 0x01 / PUSH1 0x00 / SSTORE / STOP

Note on LT direction: PUSH1 0x02 places 2 on top of the SDIV result
on the stack.  LT checks TOS < NOS, i.e., 2 < (calldata/3), which
equals (calldata/3) > 2 — the intended guard.
"""
expected_verdict = "sat"
notes = """
Ground truth: SAT.  The solver must find calldata such that
floor(calldata_word / 3) > 2 (signed), i.e., calldata_word >= 9.

Witness: calldata[31]=9 → CALLDATALOAD reads 9; SDIV(9,3)=3;
LT(TOS=2, NOS=3) = 1 → JUMPI taken → SSTORE(0,1).

Stack trace (calldata[31]=9, all other bytes = 0):
  step 0:  PUSH1 0x03 → [3], sp=1
  step 1:  PUSH1 0x00 → [3, 0], sp=2
  step 2:  CALLDATALOAD(0) → [3, 9], sp=2
  step 3:  SDIV(TOS=9, NOS=3) → 9/3=3 → [3], sp=1
  step 4:  PUSH1 0x02 → [3, 2], sp=2
  step 5:  LT(TOS=2, NOS=3) → 2<3=1 → [1], sp=1
  step 6:  PUSH1 0x0d → [1, 13], sp=2
  step 7:  JUMPI(dest=13, cond=1) → pc=13, sp=0
  step 8:  JUMPDEST at pc=13 → pc=14
  step 9:  PUSH1 0x01 → [1], sp=1
  step 10: PUSH1 0x00 → [1, 0], sp=2
  step 11: SSTORE(slot=0, value=1) → sto[0]=1, sp=0
  step 12: STOP → halted=1 → bad fires (sto[0]==1 ∧ halted ∧ ¬trap)

Without witness (calldata=0): SDIV(0,3)=0; LT(TOS=2, NOS=0) = 2<0 = 0
→ JUMPI falls through → STOP without SSTORE → UNSAT.

BMC bound=20 is sufficient: taken path has 13 steps (witness_step=12).
"""
