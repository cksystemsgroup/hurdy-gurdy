[task]
title = "chainid-gated-sstore"
description = """
Contract where CHAINID (0x46) is used to branch on the current chain identifier.
PUSH1 0x01 / CHAINID / EQ / PUSH1 0x08 / JUMPI / STOP / JUMPDEST / PUSH1 0x01 /
PUSH1 0x00 / SSTORE / STOP.

CHAINID pushes the chain ID (EIP-1344, bv256). The constraint in
emit_context_inputs pins chainid = 1 (Ethereum mainnet default) unconditionally.
EQ(chainid, 1) = 1 → JUMPI is taken → SSTORE(slot=0, val=1) → STOP → bad fires.

Opcode sequence (15 bytes):
  PUSH1 0x01 / CHAINID / EQ / PUSH1 0x08 / JUMPI / STOP /
  JUMPDEST / PUSH1 0x01 / PUSH1 0x00 / SSTORE / STOP

Path analysis (chainid == 1, always):
  pc=0:  PUSH1 0x01 → stack[0]=1
  pc=2:  CHAINID → stack[1]=1 (ctx["chainid"] constrained to 1)
  pc=3:  EQ(1, 1) = 1 → stack[0]=1
  pc=4:  PUSH1 0x08 → stack[1]=8
  pc=6:  JUMPI(dest=8, cond=1) → jump taken, sp=0, pc=8
  pc=8:  JUMPDEST
  pc=9:  PUSH1 0x01 / PUSH1 0x00 / SSTORE(slot=0, val=1) / STOP → bad fires at step 9.
"""
expected_verdict = "sat"
notes = """
Ground truth: SAT. chainid is constrained to 1 by default in emit_context_inputs
(ChainID default = 1, SCHEMA.md §4). EQ(1, 1) = 1 is unconditional — the SAT
witness is any execution, since chainid is always 1.

Demonstrates P27: lower_chainid pushes ctx["chainid"] — a symbolic context value
pre-constrained to 1, enabling deterministic branch resolution at the source level.

CHAINID is commonly used in Solidity for cross-chain replay protection (EIP-712
domain separators). This seed exercises that the EQ comparison with 1 resolves
correctly in the BTOR2 model.

Gas budget: 3 (PUSH1) + 2 (CHAINID) + 3 (EQ) + 3 (PUSH1) + 10 (JUMPI)
            + 1 (JUMPDEST) + 3 (PUSH1) + 3 (PUSH1) + 20000 (SSTORE cold)
            + 0 (STOP) = 20028. Well within 1,000,000 limit.

BMC bound=12 is sufficient: bad fires at step 9 (0-indexed).
"""
