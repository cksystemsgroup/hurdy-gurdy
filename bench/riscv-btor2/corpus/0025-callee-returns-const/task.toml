[task]
id = "0025-callee-returns-const"
task_class = "register-equality"
difficulty = "T3"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
The program calls `callee` (which sets x10 = 42 then returns), then
computes x11 = x10 + 1 and halts. Can x11 == 43 at the ebreak?
"""

[expected]
verdict = "reachable"

[witness]
bad_pc = 65546
halted_step = 5
halted_step_tolerance = 2

[witness.final_regs]
11 = 43
10 = 42

[notes]
text = """
T3 because the LLM under condition B must extend the analysis scope
to include `callee`. With the default scope (entry function only,
included_callees empty), the dispatch self-loops at PCs outside the
analyzed set (SCHEMA.md §6) — execution freezes at the callee's
entry PC and never returns, so the post-call x11=43 state is
unreachable.

Empirical confirmation:
  scope.included_callees=["callee"]: reachable
  scope.included_callees=[]:         unreachable

This is the simplest demonstration of "decomposition by scope
extension". Future T3 tasks (0028 callee-with-loop) demonstrate
the alternate decomposition path via LearnedFact when inlining
the callee makes BMC too expensive.
"""
