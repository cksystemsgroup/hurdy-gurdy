[task]
id = "0038-cleanup-must-run"
task_class = "path-coverage"
difficulty = "T1"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
The program initializes x10 to 99, sets x6 to 1, and conditionally
branches over a "cleanup" instruction (`li x10, 0` at PC 0x1000a).
Since x6 is 1, the branch is NOT taken and cleanup runs. After
halt, can the witness state include x10 = 0 AND a trace that
visited PC 0x1000a (the cleanup instruction)?
"""

[expected]
verdict = "reachable"

[witness]
bad_pc = 65548
halted_step = 4
halted_step_tolerance = 2
executed_pcs = [65546]

[witness.final_regs]
10 = 0
6 = 1

[notes]
text = """
First corpus task to exercise:
  - the `Executed(pc)` observable type (alongside RegisterAt)
  - the [witness.executed_pcs] required-set check in the matcher

The "cleanup must run" framing is the canonical example from
BENCHMARKING.md §4.5 of why a witness fingerprint check matters
beyond just the verdict: a wrong-but-consistent reasoning path
might claim x10 = 0 by some other mechanism (e.g., "the cleanup
was branched over and x10 was zero from a register-init"). The
required-PC check forces the LLM to identify HOW x10 became 0,
not just THAT it did.

Note that the matcher's executed_pcs check is positive set-
membership only: every listed PC must appear in observed.
executed_pcs. There is no "this PC must NOT appear" form (would
require matcher extension). For "skip suspicious branch"-style
tests we rely on positive-path requirements + verdict shape (see
0039).

Companion to v0.2 plan A2 (path coverage, 3 tasks).
"""
