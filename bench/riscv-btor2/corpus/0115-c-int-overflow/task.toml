[task]
id = "0115-c-int-overflow"
task_class = "assertion-reachability"
difficulty = "T2"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
A bare-metal C program computes y = INT_MAX + 1 then widens
y to long z and traps if z != -2147483648. C's signed overflow
is undefined; on RV64 the addw + sign-extension makes the actual
behaviour explicit. Can the `trap` function be reached?
"""

[expected]
verdict = "unreachable"

[c]
opt_level = "0"
bound     = 60

[notes]
text = """
First lowering-sensitive task in the C-derived corpus
(SCOPE.md §4 lowering criteria). A reader who treats the C as
"signed overflow is UB, can't reason" misses the actual RV64
addw + sign-extension semantics that the BTOR2 lowering makes
explicit. The trap is provably unreachable iff the lowering's
INT_MAX+1 = INT_MIN and sign-ext to long is correctly modeled.

Pinned to -O0 because at -O1+ gcc may optimise assuming no
overflow (UB → undefined assumption) and the resulting trace no
longer exercises addw's wraparound. A dedicated -O0 task is the
honest way to test the lowering surface; an -O1+ analogue would
be testing gcc's UB-assumption behaviour, a different question.
"""
