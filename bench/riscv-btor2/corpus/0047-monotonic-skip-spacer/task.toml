[task]
id = "0047-monotonic-skip-spacer"
task_class = "global-invariant"
difficulty = "T3"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
The program loops while x5 < 16. Each iteration unconditionally
increments x5 by 1; on iterations where x5 is odd (low bit set),
x6 is also incremented by 1. With x5 = 0 and x6 = 0 at entry, can
x6 ever exceed x5 at any cycle of execution?
"""

[expected]
verdict = "proved"

[notes]
text = """
Multi-variable inductive invariant. The invariant is "x6 ≤ x5
at every cycle reachable from entry." The bad expression
`gt(reg(6), reg(5))` is checked by Spacer at every cycle.

The invariant holds inductively because:
  - At entry: x5 = x6 = 0, so x6 = x5 ≤ x5.
  - In the body: x5 is always incremented by 1; x6 is incremented
    by either 0 or 1 (depending on x5's parity). So `x6 - x5`
    never increases per iteration. Combined with the entry value
    `x6 - x5 = 0`, this gives `x6 ≤ x5` forever.

This task is more demanding than 0020 / 0021 / 0045 because the
invariant relates two registers rather than bounding one. Spacer
must synthesize the relation `x6 ≤ x5`, not just a per-register
range. T3 in the difficulty taxonomy because the inductive
argument involves reasoning about the conditional skip, not just
a monotonic counter.

Companion to v0.2 plan A4 (inductive invariants, 3 tasks).
"""
