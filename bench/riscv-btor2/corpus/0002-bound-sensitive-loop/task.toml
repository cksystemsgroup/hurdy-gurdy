[task]
id = "0002-bound-sensitive-loop"
task_class = "register-equality"
difficulty = "T2"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
Can register x10 ever equal 42 during execution of the program?
"""

[expected]
verdict = "reachable"

[witness]
bad_pc = 65550
halted_step = 18
halted_step_tolerance = 0

[witness.final_regs]
10 = 42
5 = 8
6 = 8

[notes]
text = """
The loop runs exactly eight times (counter goes 0→1→…→8). Cycle-by-
cycle: 2 init cycles (`li t0,0`, `li t1,8`), then 8 iterations of
2 cycles each (addi + bne), then the post-loop `li a0,42` at cycle 18.
So reaching x10 = 42 requires bound ≥ 18.

The reference spec.json ships with `bound=20` — sufficient. T2 is
graded on whether the LLM under condition B *would have* arrived at
a bound ≥ 18: if their constructed AnalysisDirective uses the default
(typically much smaller, see SCHEMA.md §10), the solver returns
`unreachable` and the LLM must recognise the BMC bound is the limiting
factor and re-dispatch with a larger one.

The PC `65550` (= 0x1000E) is the `ebreak` address from objdump.

Not lowering-sensitive: the answer doesn't turn on RISC-V semantics
the source language hides; it turns on BMC's bounded nature. A reader
of the source can derive the same answer if they know how many cycles
to allow for.

The witness's `halted_step` and observable_state are illustrative —
the rubric LLM checks the witness fingerprint (bad_pc and
observable_state) for refutable tasks, not the exact step count.
"""
