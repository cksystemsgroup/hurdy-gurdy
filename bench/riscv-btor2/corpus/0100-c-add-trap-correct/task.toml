[task]
id = "0100-c-add-trap-correct"
task_class = "assertion-reachability"
difficulty = "T1"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
A bare-metal C program computes c = 5 + 7 and traps if c != 12.
Can the `trap` function be reached?
"""

[expected]
verdict = "unreachable"

[notes]
text = """
First v0.4 C-corpus prototype. Validates the _compile_c.py
auto-spec-gen pipeline end-to-end:

  task.c (hand-written) ->  source.elf, pcs.json, dwarfmap, spec.json

Mirrors 0007-simple-add-baseline conceptually but in C, with the
property expressed via the embedded-trap pattern (see CBMC,
ESBMC). The trap function's entry PC becomes the bad_pc.

Difficulty T1 by design: this task only validates the toolchain.
No lowering subtleties, no register pressure, no calling-
convention quirks — those will come with subsequent C tasks once
the prototype passes all four pre-flight oracles.
"""
