[task]
id = "0011-srai-vs-srli"
task_class = "register-equality"
difficulty = "T4"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[lift]
expected_cause_pc = 65540
expected_cause_mnemonic = "SRAI"
acceptable_alternative_pcs = []
expected_explanation_summary = """
SRAI is the arithmetic shift right (SCHEMA.md §5) — it propagates
the sign bit. With x5's top bit set (LUI set bit 63), the bits
shifted in from the left are all 1, giving x10 = 0xFFFFFFFFF8000000
— not the logical-shift answer 0x0FFFFFFFF8000000 that SRLI would
have produced.
"""
expected_keywords = ["arithmetic shift", "sign", "SRAI", "propagate"]

[question]
text = """
The program loads x5 = 0xFFFFFFFF80000000 (sign-extended LUI of
0x80000) and computes `srai x10, x5, 4`. Can register x10 hold the
value 0x0FFFFFFFF8000000 after halt?
"""

[expected]
verdict = "unreachable"

[notes]
text = """
SCHEMA.md §5 (RV64I shifts): SRAI is the *arithmetic* shift right —
it propagates the sign bit. With x5's top bit set, the four bits
shifted in from the left are all 1, giving:

  x10 = 0xFFFFFFFFF8000000   (NOT 0x0FFFFFFFF8000000)

The question's value (0x0FFFFFFFF8000000) is the answer SRLI
(*logical* shift) would produce — it zero-fills.

Lowering-sensitive because C `>>` semantics depend on operand type
(`int` is implementation-defined but typically arithmetic; `unsigned
int` is always logical). A programmer reading the assembly
mnemonic without internalising the A-vs-L distinction will mis-
predict; the BTOR2 lowering uses the explicit `sra` operator.
"""
