[task]
id = "0119-c-signed-vs-unsigned-shift-right"
task_class = "assertion-reachability"
difficulty = "T2"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
A bare-metal C program right-shifts the same bit pattern
(0xFFFFFFF8) twice — once as a signed `int`, once as
`unsigned int` — and traps if either result is wrong. Signed
gives -2 (sign-fill); unsigned gives 0x3FFFFFFE (zero-fill).
The C source uses the same `>>` operator both times; the
compiler picks SRAW vs SRLW based on the operand's type. Can
the `trap` function be reached?
"""

[expected]
verdict = "unreachable"

[c]
opt_level = "0"
bound     = 80

[notes]
text = """
C's `>>` operator is type-polymorphic; on RV64 it lowers to two
*different* instructions (SRAW / SRLW) and the BTOR2 encoding
distinguishes them via the right concatenation/zero-extension
choice. SCHEMA.md §13 / SCOPE.md §4.2 cite this as a canonical
lowering surface.
"""
