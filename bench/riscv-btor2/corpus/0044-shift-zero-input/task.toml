[task]
id = "0044-shift-zero-input"
task_class = "register-equality"
difficulty = "T2"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
The program loads x5 = 1 and computes `sllw x10, x5, x6` (32-bit
shift-left of 1 by the masked shift amount in x6). The entry
value of x6 is a free input. After halt, can register x10 hold
the value 0?
"""

[expected]
verdict = "unreachable"

[notes]
text = """
Negative-result input search. The matcher accepts `unreachable`
for free-input tasks where BMC has shown no input satisfies the
property within the bound. Here BMC must rule out all 2^64
possible x6 values.

Why x10 = 0 is unreachable: SCHEMA.md §5 (W-suffix shift
semantics): SLLW masks x6 to its low 5 bits before shifting, then
sign-extends the 32-bit result. With x5 = 1, the shift amount
`(x6 & 31)` is in {0, 1, ..., 31}. For each value k in that
range:

  (1 << k) [31:0]  has bit k set, all others clear

so the 32-bit result is always non-zero. Sign-extension to 64
preserves non-zero-ness (a nonzero 32-bit value sign-extends to
some nonzero 64-bit value).

For k = 31: result = 0x80000000 -> sign_ext = 0xFFFFFFFF80000000
For k = 0:  result = 0x00000001 -> sign_ext = 0x0000000000000001
For all 0 ≤ k ≤ 31: result is non-zero.

So x10 = 0 has no satisfying input.

Lowering-sensitive because a programmer who expects "shift by
larger-than-width = zero result" (e.g., from C's UB on
out-of-range shifts, or from x86 semantics where shamt is masked
to a different width) might answer reachable. RISC-V's masking
rule is explicit in SCHEMA.md §5.

Companion to v0.2 plan A3 (free-input search). Pairs with 0011-
srai-vs-srli (which tests SRAI signed-vs-unsigned shift) and
0031-sllw-shamt-masking-loop (which tests the masking with a
deterministic shift amount).
"""
