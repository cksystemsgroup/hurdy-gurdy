[task]
id = "0003-addiw-sign-ext"
task_class = "register-equality"
difficulty = "T1"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
After the program halts, can register x10 hold the value 0x80000000?

The first instruction `lui x5, 0x80000` sets x5; the second
`addiw x10, x5, 0` is a 32-bit add. Naively reading "32-bit add"
might suggest x10 ends up at 0x80000000.
"""

[expected]
verdict = "unreachable"

[notes]
text = """
SCHEMA.md §5 (RV64I word-only): ADDIW computes the 32-bit add and
**sign-extends** the result to 64 bits. The high bit of 0x80000000 is
1, so the sign-extended value is 0xFFFFFFFF80000000, NOT 0x80000000.

LUI also sign-extends per §5: `lui x5, 0x80000` puts 0xFFFFFFFF80000000
into x5 (not 0x80000000), but that's beside the point — the question
is about x10 and the ADDIW step.

Lowering-sensitive because a programmer thinking in C `int` semantics
or even raw 32-bit assembly may not internalise that RV64 word-only
ops sign-extend their results to XLEN. The BTOR2 lowering encodes
this unambiguously (see translation/instructions for ADDIW).
"""
