[task]
id = "0116-c-divu-sentinel"
task_class = "assertion-reachability"
difficulty = "T2"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
A bare-metal C program computes q = x / y where y is volatile-
zero (forcing divide-by-zero at runtime), then widens q to
unsigned long z and traps if z != 0xFFFFFFFFFFFFFFFF. C says
this is UB; on RV64 DIVU returns the sentinel 0xFFFFFFFF and
the subsequent W-suffix sign-extension fills the upper bits
with all-ones too. Can the `trap` function be reached?
"""

[expected]
verdict = "unreachable"

[c]
opt_level = "0"
bound     = 60

[notes]
text = """
Second lowering-sensitive C task (companion to
0115-c-int-overflow), modelled on the hand-written
0004-divu-by-zero-sentinel from the v0.1 corpus. The point: a C
reader treating divide-by-zero as "UB, can't reason" misses the
RV64 DIVU sentinel + W-suffix sign-extension behaviour that the
BTOR2 lowering makes explicit. The trap is unreachable iff the
lowering correctly models BOTH the sentinel return value AND
the surrounding sign-extension semantics.

Pinned to -O0 because at -O1+ gcc may optimise on the assumption
that divide-by-zero never happens (UB → undefined assumption);
the resulting trace would no longer exercise the divuw sentinel
at all. The lowering surface this task targets is RV64-specific,
so the higher -O levels would test gcc behaviour rather than
the pair's lowering — out of scope.

Difficulty T2 by the same logic as 0115: the analysis directive
is ordinary BMC, but the *question* requires the LLM to reason
about lowering-specific semantics that the C source hides.
"""
