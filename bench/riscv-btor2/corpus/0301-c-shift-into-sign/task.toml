[task]
id = "0301-c-shift-into-sign"
task_class = "assertion-reachability"
difficulty = "T2"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
A bare-metal C program sets x = 1 and computes y = x << 31,
then widens y to long z and traps if z != -2147483648.
C11 §6.5.7 p4 makes this UB: left-shifting a signed value
when the result is not representable in the result type.
On RV64, gcc -O0 emits slliw: (1 << 31) mod 2^32 = 0x80000000,
sign-extended to -2147483648L.  Can the `trap` function be reached?
"""

[expected]
verdict = "unreachable"

[c]
opt_level = "0"
bound     = 10

[notes]
text = """
Adversarial wedge for the shift-into-sign-bit UB class
(NEXT_STEPS.md §4 item 4; distinct from 0261-c-shift-oversized
which covers shift amount >= bit width).

The C UB here arises from the mathematical result 2^31 = 2147483648
overflowing the signed 32-bit type (not from an illegal shift amount:
31 < 32 so --shift-check does not trigger; only --signed-overflow-check
catches this).  CBMC with --signed-overflow-check reports VERIFICATION
FAILED: signed arithmetic overflow in `x << 31`.

Hurdy-gurdy, reasoning on the RV64 ELF, correctly reports unreachable:
slliw produces 0x80000000 which sign-extends to -2147483648L; the
trap condition z != -2147483648L is identically false.

Pinned to -O0: at -O1+ gcc may exploit UB assumptions to optimise the
shift (e.g. treat x as 0 or elide the branch entirely).
"""
