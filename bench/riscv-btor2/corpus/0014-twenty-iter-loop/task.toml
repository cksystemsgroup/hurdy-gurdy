[task]
id = "0014-twenty-iter-loop"
task_class = "register-equality"
difficulty = "T2"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
The program loops 20 times incrementing a counter, then assigns
x10 = 99 and halts. Can register x10 hold the value 99 after halt?
"""

[expected]
verdict = "reachable"

[witness]
bad_pc = 65550
halted_step = 42
halted_step_tolerance = 0

[witness.final_regs]
10 = 99
5 = 20
6 = 20

[notes]
text = """
20-iteration counterpart of 0002-bound-sensitive-loop and
0008-long-loop-bound. Cycle count: 2 init + 2·20 (loop) + 1 marker
+ 1 ebreak ≈ 42. The reference spec ships with bound=50, sufficient.

T2 because the LLM under condition B must recognise the default
bound (typically too small) gives `unreachable` here, then bump
the bound. The triple of 0002 / 0008 / 0014 is graded as a
single T2 family — getting two of three implies the LLM
generalised; getting one of three is luck.
"""
