[task]
id = "0123-c-endianness-le"
task_class = "assertion-reachability"
difficulty = "T2"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
A bare-metal C program stores 0x1234 to an unsigned short and
reads the underlying bytes through a union with an unsigned char
array. On RV64 (little-endian), byte[0] should be 0x34 and
byte[1] should be 0x12. Can the `trap` function be reached?
"""

[expected]
verdict = "unreachable"

[c]
opt_level = "0"
bound     = 50

[notes]
text = """
C-source analogue of 0010-lh-endianness. The lowering surface
is RV64's little-endian byte layout: a multi-byte value's low
byte sits at the lower address. The BTOR2 lowering encodes the
per-byte memory model directly (SCHEMA.md §13).

The `union` access pattern (instead of a `unsigned short *` →
`unsigned char *` pointer cast) is deliberate: the v0.4
memory-model diagnostic (CORPUS_V0.4_PLAN.md) found that
symbolic-pointer derefs add a 4-8× z3 wall-clock penalty per
deref, while direct stack-relative byte loads (which `union`
generates) keep the cost linear.
"""
