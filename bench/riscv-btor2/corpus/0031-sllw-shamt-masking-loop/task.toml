[task]
id = "0031-sllw-shamt-masking-loop"
task_class = "register-equality"
difficulty = "T2"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
The program loads x5 = 1 and x6 = 30, then runs four iterations of
`sllw x10, x5, x6; addi x6, x6, 1`. x6 takes the values 30, 31, 32,
33 across the four iterations. After halt, can register x10 hold
the value 2?

Reading the assembly literally suggests "shifting 1 left by 33 bits
discards the value, leaving x10 = 0", which would make x10 = 2
unreachable.
"""

[expected]
verdict = "reachable"

[witness]
bad_pc = 65554
halted_step = 19
halted_step_tolerance = 2

[witness.final_regs]
10 = 2
5 = 1
6 = 34

[notes]
text = """
SCHEMA.md §5 (RV64I 32-bit shift instructions): SLLW, SRLW, SRAW
mask the shift amount (rs2) to its low **5 bits** before shifting
the low 32 bits of rs1; the result is sign-extended to 64 bits.
This contrasts with SLL/SRL/SRA which mask to 6 bits for the
64-bit shift.

Per-iteration trace (each loop body is sllw, addi x6, addi x7, bnez):

  iter 1: x6=30 -> sllw 1 by 30  -> x10 = 0x40000000 (sign-ext OK)
  iter 2: x6=31 -> sllw 1 by 31  -> x10 = 0xFFFFFFFF80000000
  iter 3: x6=32 -> shamt=32&31=0 -> x10 = 1
  iter 4: x6=33 -> shamt=33&31=1 -> x10 = 2  *** witness anchor ***

The straight-line BMC step count is 3 entry transitions + 4 * 4
loop transitions + 1 fall-through bnez = step 19 at the ebreak's
PC; tolerance=2 absorbs convention drift between authors and the
BMC engine (see audit_anchors.py for the systematic check).

Lowering-sensitive because a programmer who reads "shift left
logical word, by x6=33" without internalising SCHEMA.md §5's 5-bit
masking rule will report unreachable. The BTOR2 lowering encodes
the masking unambiguously: the bad expression eq(reg(10), const(2))
is satisfiable at PC 0x10012 in cycle 19.

Pairs as a smoke for slot_CC_haiku: under condition A this is the
kind of task where reading instructions linearly produces a wrong
answer; under condition B the LLM should compile and dispatch and
get the correct verdict back from z3-bmc.
"""
