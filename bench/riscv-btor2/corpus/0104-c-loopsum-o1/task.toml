[task]
id = "0104-c-loopsum-o1"
task_class = "assertion-reachability"
difficulty = "T2"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
A bare-metal C program sums i for i in [0, 10) into `sum` and
traps if the result isn't 45. Compiled with `gcc -O1`. Can the
`trap` function be reached?
"""

[expected]
verdict = "unreachable"

[c]
opt_level = "1"
bound     = 200

[notes]
text = """
Member of the 010X-c-loopsum-oN family. At -O1 gcc keeps the
loop structure but registerises `i` and `sum`; the per-iteration
load/store overhead disappears. Cycle count drops vs -O0 but
the loop is still explicit (10 iterations of a small body).
"""
