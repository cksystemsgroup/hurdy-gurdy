[task]
id = "0018-or-baseline"
task_class = "register-equality"
difficulty = "T1"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
The program loads x5 = 12 (0b1100), x6 = 10 (0b1010), then computes
`or x10, x5, x6`. Can register x10 hold the value 14 after halt?
"""

[expected]
verdict = "reachable"

[witness]
bad_pc = 65544
halted_step = 4
halted_step_tolerance = 0

[witness.final_regs]
10 = 14
5 = 12
6 = 10

[notes]
text = """
Trivial bitwise OR: 0b1100 | 0b1010 = 0b1110 = 14. T1 baseline,
non-LS. Pairs with 0017 to anchor the AND/OR baseline tier.
"""
