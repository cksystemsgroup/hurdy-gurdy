[task]
id = "0016-bge-signed"
task_class = "register-equality"
difficulty = "T1"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
The program loads x5 = -1, x6 = 1, then branches with `bge x5, x6,
taken`. The fallthrough path sets x10 = 42; the taken path sets
x10 = 99. Can register x10 hold the value 99 after the program halts
at the fallthrough ebreak (PC 0x1000C)?
"""

[expected]
verdict = "unreachable"

[notes]
text = """
Counterpart to 0013-bgeu-vs-bge. SCHEMA.md §5: BGE is the *signed*
"≥". With x5 = -1 and x6 = 1, signed -1 < 1, so the branch is NOT
taken and execution falls through to set x10 = 42 and halt at
0x1000C.

A reader thinking unsigned (treating x5 as 2^64 - 1) would expect
the branch to be taken (2^64 - 1 ≥ 1), x10 = 99, halt at 0x10012.
That would also be a valid x10 = 99 state — but at PC 0x10012, NOT
0x1000C. The property anchors specifically at 0x1000C (the actual
halt under signed semantics), so the unreachable verdict captures
"the signed semantics force the fallthrough halt".

The two tasks 0013 (BGEU, naive-signed mispredicts) and 0016 (BGE,
naive-unsigned mispredicts) are graded as a pair — getting both
implies the LLM internalised the U-suffix distinction.
"""
