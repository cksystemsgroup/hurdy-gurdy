[task]
id = "0005-lbu-vs-lb"
task_class = "register-equality"
difficulty = "T4"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[lift]
expected_cause_pc = 65546
expected_cause_mnemonic = "LBU"
acceptable_alternative_pcs = []
expected_explanation_summary = """
LBU is the unsigned byte load — it zero-extends the loaded byte to
64 bits (SCHEMA.md §5). After loading 0xFF with LBU,
x10 = 0x00000000000000FF, not the sign-extended 0xFFFFFFFFFFFFFFFF
that LB would have produced. A reader who treats LB and LBU as
"both load a byte" predicts the wrong verdict.
"""
expected_keywords = ["zero-extend", "LBU", "unsigned", "byte"]

[question]
text = """
The program writes byte 0xFF to memory at address 0x20000000, then
loads it back with `lbu x10, 0(x6)`. Can register x10 hold the value
0xFFFFFFFFFFFFFFFF after halt?
"""

[expected]
verdict = "unreachable"

[notes]
text = """
SCHEMA.md §5 (loads): LBU is the *unsigned* byte load — it
**zero-extends** the loaded byte to 64 bits. After loading 0xFF with
LBU, x10 = 0x00000000000000FF, NOT the sign-extended
0xFFFFFFFFFFFFFFFF.

If the program had used LB (signed byte load), x10 would be
0xFFFFFFFFFFFFFFFF and the verdict would flip to reachable.

Lowering-sensitive because a programmer who treats LB and LBU as
"both load a byte" misses that the U variant zero-extends. C source
that does `unsigned char x = ...; long y = x;` lowers to LBU, while
`signed char x = ...; long y = x;` lowers to LB; the schema makes
this distinction explicit.

The address 0x20000000 is outside any PT_LOAD range (the .text
section starts at 0x10000), so the byte starts uninitialized. The
preceding SB constrains the byte to 0xFF; the LBU then reads back
the constrained byte. Without the SB (or with SB elsewhere), the
byte would be free and x10 could take any uint8 value — but still
not 0xFFFF…FFFF, since LBU caps at 8 bits.
"""
