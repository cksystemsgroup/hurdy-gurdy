[task]
id = "0120-c-byte-load-signedness"
task_class = "assertion-reachability"
difficulty = "T2"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
A bare-metal C program loads the same byte (0xFF) through a
`signed char` and an `unsigned char`, widens both to int, and
traps if the results aren't -1 and 255 respectively. The compiler
picks `lb` (sign-extending byte load) vs `lbu` (zero-extending
byte load) based on the source operand's type. Can the `trap`
function be reached?
"""

[expected]
verdict = "unreachable"

[c]
opt_level = "0"
bound     = 80

[notes]
text = """
C-source analogue of the hand-written 0005-lbu-vs-lb. Same
memory contents read through different pointer types compile to
different RV64 instructions (lb vs lbu). The BTOR2 lowering
encodes the sign vs zero extension explicitly — a reader who
treats "char load" as a single primitive will be wrong.
"""
