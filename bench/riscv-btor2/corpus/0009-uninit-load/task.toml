[task]
id = "0009-uninit-load"
task_class = "register-equality"
difficulty = "T1"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
The program loads 8 bytes from address 0x40000000 into x10. Address
0x40000000 is outside any PT_LOAD segment of the binary. Can register
x10 hold the value 42 after halt?
"""

[expected]
verdict = "reachable"

[witness]
bad_pc = 65544
halted_step = 3
halted_step_tolerance = 0

[witness.final_regs]
10 = 42

[notes]
text = """
SCHEMA.md §4 (ELF loading): bytes outside any PT_LOAD segment are
**uninitialized** — the schema deliberately does not silently zero
unmapped memory. Every byte loaded from such an address is a free
input; the LD therefore composes 8 free bytes into a free 64-bit
value, so x10 can hold any uint64 value, including 42.

Lowering-sensitive because a programmer trained on calloc / BSS
zero-init may assume "uninitialised RAM is zero". The schema
distinguishes "explicitly zero (BSS)" from "outside PT_LOAD (free)"
— see §4 second bullet.

The witness's final_regs[5] / [6] are deliberately omitted: x6 ends
at 0x40000000 deterministically, but x10 is free, so the witness
shape names *only* the value the question asks about.
"""
