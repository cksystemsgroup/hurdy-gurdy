[task]
id = "0045-x5-bounded-counter-spacer"
task_class = "global-invariant"
difficulty = "T2"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
The program loops while x5 < 10, incrementing x5 by 1 each
iteration. With x5 = 0 at entry, can x5 ever hold a value
strictly greater than 10 at any cycle of execution?
"""

[expected]
verdict = "proved"

[notes]
text = """
Global invariant question, NOT pc-anchored. The bad expression
`gt(reg(5), const(10))` is checked at every cycle by Spacer:
"is x5 ever signed-greater-than 10?"

With RegisterInit(5, eq, 0): x5 starts at 0. The transition
relation only increments x5 by 1 inside the loop body and
freezes it after the loop exits (x5 = 10 at exit, no further
writes). So x5 ∈ {0, 1, ..., 10} at every reachable cycle.

The bound on x5 is NOT just "x5 ≤ 10 forever" -- it's the joint
inductive invariant "(x5 ≤ 10) AND (loop exit condition or
x5 < 10)". Spacer must synthesize this; BMC at any finite bound
N would only confirm "x5 ≤ 10 within N cycles", which is a
weaker bounded claim and would surface as `unreachable` (not
`proved`).

Companion to v0.2 plan A4 (inductive invariants, 3 tasks).
Existing 0020-monotonic-x5-spacer asks the *negative* form
("x5 < 0 ever?"); this task asks the *upper-bound* form
("x5 > 10 ever?"). Together they pin the invariant from both
sides.
"""
