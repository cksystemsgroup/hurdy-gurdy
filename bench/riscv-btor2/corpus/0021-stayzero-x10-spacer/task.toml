[task]
id = "0021-stayzero-x10-spacer"
task_class = "global-invariant"
difficulty = "T2"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
The program is an infinite loop that increments x5 each iteration
but never writes x10. With x10 = 0 at entry, can x10 ever hold a
non-zero value at any cycle of execution?
"""

[expected]
verdict = "proved"

[notes]
text = """
The program has no halt — `beq x5, x5, _start` is unconditionally
true so execution loops forever inside the analyzed scope. There is
no ebreak.

Bad expression `neq(reg(10), const(0))` is global, not pc-anchored.
With RegisterInit(10, eq, 0), x10 is pinned to 0 at entry. The trans
relation never mentions x10, so x10 stays at its init value forever.

Why z3-spacer is the only engine that gives a clean answer: BMC at
bound=N explores N cycles, finds x10 stays 0, returns `unreachable`
within bound — but the question is whether x10 can EVER be nonzero,
which is unbounded. Pono's BMC is in the same situation. Spacer
encodes the system as Horn clauses and discovers the inductive
invariant `x10 == 0`; emits `proved` for the bad-disjunction Horn
query (no derivation of the goal is possible from any reachable
state).

Companion to 0020: 0020 proves an invariant about a state that DOES
change (x5 increments); 0021 proves an invariant about a state that
NEVER changes (x10 untouched). Both exercise Spacer, neither admits
a useful BMC bound.
"""
