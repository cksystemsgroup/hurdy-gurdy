[task]
id = "0111-c-byteswap-o0"
task_class = "assertion-reachability"
difficulty = "T2"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
A bare-metal C program byte-reverses 0xDEADBEEFCAFEBABE via 8
iterations of shift-mask-shift-or, expecting 0xBEBAFECAEFBEADDE.
Compiled with `gcc -O0`. Can the `trap` function be reached?
"""

[expected]
verdict = "unreachable"

[c]
opt_level = "0"
bound     = 120
