[task]
id = "0300-c-neg-int-min"
task_class = "assertion-reachability"
difficulty = "T2"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
A bare-metal C program sets x = INT_MIN (0x80000000) and computes
y = -x, then widens y to long z and traps if z != -2147483648.
C says -INT_MIN is signed-integer-overflow UB.  On RV64, gcc -O0
emits negw (subw rd, x0, rs): two's-complement 32-bit negation,
0 - 0x80000000 mod 2^32 = 0x80000000 = INT_MIN.  Sign-extending
to long gives z = -2147483648L.  Can the `trap` function be reached?
"""

[expected]
verdict = "unreachable"

[c]
opt_level = "0"
bound     = 10

[notes]
text = """
Adversarial wedge for the unary-negation-overflow UB class
(NEXT_STEPS.md §4 item 1).  Companion to 0115-c-int-overflow
(addw overflow) and 0117-c-int-min-div-neg-one (divw sentinel).

Tests whether the BTOR2 lowering's negw encoding (subw rd, x0,
rs) correctly models two's-complement wrap-around at the minimum
signed value.  The translator emits sub(zero_bv64, x) followed by
a word-size truncation / sign-extension; the bvsdiv overflow
sentinel is a separate mechanism that does not apply here.

CBMC with --signed-overflow-check reports VERIFICATION FAILED:
the arithmetic overflow in -x is flagged as a property violation.
The baselines/cbmc.py adapter enables that flag.  Hurdy-gurdy,
reasoning on the RV64 ELF, correctly reports unreachable: negw
wraps to INT_MIN and z == -2147483648L holds.

Pinned to -O0: at -O1+ gcc may rewrite -x using C UB assumptions
(e.g. propagate that x is non-negative since -INT_MIN is UB) and
elide the computation or replace it with an optimised form.
"""
