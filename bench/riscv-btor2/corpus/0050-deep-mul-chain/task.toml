[task]
id = "0050-deep-mul-chain"
task_class = "register-equality"
difficulty = "T2"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
The program loads x10 = 2 and x11 = 3, then performs nine
sequential `mul x10, x10, x11` instructions and halts. Can register
x10 hold the value 39366 (= 2 · 3⁹) after halt?
"""

[expected]
verdict = "reachable"

[witness]
bad_pc = 65576
halted_step = 11
halted_step_tolerance = 2

[witness.final_regs]
10 = 39366
11 = 3

[notes]
text = """
T2 not because the analysis directive is exotic — bound = 14 is
within the v0.1.2 default ladder — but because this is the corpus's
first task that *empirically* requires picking a non-default solver
to be cost-effective. Engine perf (bench/riscv-btor2/engine_bench.py)
shows bitwuzla ≈ 6–13× faster than z3-bmc on every BMC task in v0.2;
the deep bvmul chain here is one of the shapes where the gap is
largest in absolute terms (z3 bitblasts the polynomial product
lattice each cycle).

The pin to bitwuzla in spec.json is therefore the *demonstrated*
right choice, not a stylistic preference. An LLM under condition B
that defaults to z3-bmc still gets the verdict, but at higher
wall-clock; an LLM that picks bitwuzla matches the pre-registered
choice. This is the corpus's mechanism for measuring whether
condition-B prompt scaffolding has taught the LLM to think about
engine selection at all (Stream 6 in the v0.3 plan).

The expected verdict is `reachable` because the program is
deterministic — every trace ends with x10 = 39366, so the
bad-conjunction holds at PC 0x10028.
"""
