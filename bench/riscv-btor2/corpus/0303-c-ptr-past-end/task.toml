[task]
id = "0303-c-ptr-past-end"
task_class = "assertion-reachability"
difficulty = "T2"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
A bare-metal C program declares int arr[4] on the stack, then forms
the pointer p = arr + 5 (one element past the valid one-past-the-end
limit, i.e. arr+4). C11 §6.5.6p8 makes forming this pointer undefined
behaviour. The program then computes diff = p - arr and traps if
diff != 5. On RV64, gcc -O0 emits ADDI for the pointer arithmetic
(pure integer addition) and SUB+SRAI for the pointer difference:
these always produce diff = 20/4 = 5. Can the `trap` function be reached?
"""

[expected]
verdict = "unreachable"

[c]
opt_level = "0"
bound     = 20

[notes]
text = """
Adversarial wedge for the pointer-arithmetic-past-one-past-the-end UB class
(NEXT_STEPS.md §4 item 4 — the last item in the list).

C11 §6.5.6p8: "If both the pointer operand and the result point to
elements of the same array object, or one past the last element of the
array object, the evaluation shall not produce an overflow; otherwise,
the behavior is undefined." Forming arr+5 where arr has 4 elements
violates this — arr+4 is the valid one-past-the-end limit.

On RV64, pointer arithmetic is ISA-level integer addition. The compiler
emits:
  addi a5, s0, -48   ; &arr[0] (stack frame)
  addi a5, a5, 20    ; arr + 5 (5 * sizeof(int) = 20 bytes)
No hardware trap, no special sentinel. The pointer difference:
  sub  a5, a4, a5    ; byte difference = 20
  srai a5, a5, 2     ; / sizeof(int) = 5
produces 5 deterministically. The comparison diff != 5L is always false;
the trap is unreachable.

CBMC with --pointer-check reports VERIFICATION FAILED:
  [_start.pointer_arithmetic.2] pointer relation: pointer outside object
  bounds in p: FAILURE
This is a false positive — the RV64 hardware executes the arithmetic
correctly and the result is deterministic.

ESBMC (default, no explicit --pointer-check): VERIFICATION SUCCESSFUL
(correct). ESBMC does not check pointer-arithmetic bounds unless
explicitly requested; it checks only dereferences (i.e. actual array
accesses), not address formation. Since arr[5] is never read or written,
ESBMC correctly sees no violation.

Hurdy-gurdy, operating on the RV64 ELF, models the ADDI + SUB + SRAI
sequence as pure bitvector arithmetic; the property eq(pc, const(trap_pc))
is identically false; oracle returns unreachable (PASS).

This task completes the NEXT_STEPS.md §4 adversarial wedge battery:
  0125-c-sdiv-by-zero         (div-by-zero sentinel)
  0261-c-shift-oversized      (shift count >= bit width)
  0300-c-neg-int-min          (unary negation of INT_MIN)
  0301-c-shift-into-sign      (shift into sign bit)
  0302-c-intmax-add-one       (INT_MAX + 1 via volatile)
  0303-c-ptr-past-end         (pointer arithmetic past one-past-the-end)  <- this task
"""
cbmc_note = """
CBMC with --pointer-check reports VERIFICATION FAILED:
  pointer relation: pointer outside object bounds in p
False positive — on RV64 bare-metal, pointer arithmetic is integer addition;
no OOB check at hardware level. The trap (diff != 5L) is unreachable.
"""
esbmc_note = """
ESBMC (v8.3.0, default flags, no explicit --pointer-check):
VERIFICATION SUCCESSFUL (correct). ESBMC does not check pointer-arithmetic
bounds for address formation, only for dereferences. Since p is never
dereferenced (only formed and used in a difference), ESBMC sees no violation.
Validated in iter-46 session (esbmc v8.3.0 installed at /usr/local/bin/esbmc).
"""
