[task]
id = "0201-bv64-mul-zero"
task_class = "global-invariant"
difficulty = "T3"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
The program runs a 40-iteration loop that multiplies x5 by 100 on
each iteration. With x5 = 1, x6 = 100, x7 = 0, x8 = 40 at entry,
can x5 ever hold the value 0 during execution?
"""

[expected]
verdict = "reachable"

[witness]
# bv64 wraparound: after 32 multiplications by 100, x5 = 100^32
# mod 2^64 = 0. The mul instruction at iter 32 writes 0 into x5.
# Empirically verified via the framework simulator: x5 first equals
# 0 in post-step state at step 93 (PC 0x10000, the mul). Tolerance
# allows for off-by-one step-accounting between simulator and
# witness extraction.
bad_pc = 65536
halted_step = 93
halted_step_tolerance = 4

[witness.final_regs]
5 = 0

[notes]
text = """
A T3, lowering-sensitive task designed to defeat *both* the
condition-B "just BMC at default bound" play and the condition-A
"the LLM reasons it out from the source" path. The point is to
push for §14's question-compiler vocabulary (BENCHMARKING.md
§3.E) on a task where the LLM cannot trivially shortcut to the
answer.

**Why the answer is non-obvious for an LLM.** The multiplier
100 = 2^2 * 25 contributes two factors of 2 per iteration. After
32 iterations, x5 has accumulated 64 factors of 2 (plus an odd
co-factor 25^32). 2^64 divides x5, so x5 ≡ 0 (mod 2^64) — and the
mul instruction writes that 0 into the bv64 register. The 2-adic
valuation argument is a non-trivial number-theoretic observation;
LLMs that don't reach for it tend to punt to `unknown` on
"bv64 wraparound" grounds, missing the witness.

**Why the default BMC bound is insufficient.** The starter spec
sets `engine = z3-bmc, bound = 30`. Each loop iteration is 3
instructions (mul, addi, bne); 30 steps covers ~10 iterations,
during which x5 ranges over (100, 100^2, ..., 100^10 mod 2^64) —
all nonzero. BMC at bound 30 returns `unreachable` (wrong). The
LLM under condition B must notice the bound is too small and
bump it; the LLM under condition E has the additional option of
calling `simulate(spec, binding, max_steps=120, record_shadow=true)`
to *discover* the witness step concretely, then read off
`final_regs[5] == 0` and the `bad_pc` from the resulting trace
without ever paying for the larger BMC instance.

**Why this exercises §14.** The natural condition-E play here is
either:

  - simulate with record_shadow to find the precise cycle x5 hits
    0, then emit `reachable` with the witness fields from the
    trace — no BMC needed; or
  - simulate to find the cycle, then construct `BranchPin`s
    pinning the loop branch as `taken` for steps 0..31 and
    `not_taken` at step 32, then `compile` + `dispatch` at a
    tight bound (~100) — the pinned-prefix narrows the BMC search
    to one specific path.

Either path lands the right verdict; both demonstrate that the
question compiler is reachable from the LLM. A pure condition-B
solution (notice bound too small, bump to 100, dispatch) also
works — what this task forces is that the LLM cannot solve it
from the source text alone the way Haiku solved 0200 by
quoting "product of non-zero integers is non-zero."

**Why lowering_sensitive.** The verdict depends on the bv64
modular semantics of `mul`: in unbounded integer arithmetic
100^32 ≠ 0, so the answer at the source-language level would be
`unreachable`. The reachability comes entirely from the
translation to a 64-bit-wide bitvector transition system, where
overflow is defined as truncation mod 2^64. This is the §4.3
lowering-sensitivity criterion in pure form.
"""
