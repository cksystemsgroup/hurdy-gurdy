[task]
id = "0105-c-loopsum-o2"
task_class = "assertion-reachability"
difficulty = "T2"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
A bare-metal C program sums i for i in [0, 10) into `sum` and
traps if the result isn't 45. Compiled with `gcc -O2`. Can the
`trap` function be reached?
"""

[expected]
verdict = "unreachable"

[c]
opt_level = "2"
bound     = 200

[notes]
text = """
Member of the 010X-c-loopsum-oN family. At -O2 gcc may apply
loop-invariant hoisting, partial unrolling, or a closed-form
substitution for the sum. The loop bound `n` is volatile so the
trip count must be respected; the body, however, may collapse
substantially. Useful BMC-shape contrast vs -O0/-O1.
"""
