[task]
id = "0015-nested-loop"
task_class = "register-equality"
difficulty = "T2"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
The program runs a nested loop (outer 3 iterations × inner 8
iterations), then assigns x10 = 99 and halts. Can register x10 hold
the value 99 after halt?
"""

[expected]
verdict = "reachable"

[witness]
bad_pc = 65560
halted_step = 65
halted_step_tolerance = 5

[witness.final_regs]
10 = 99
5 = 3
6 = 3

[notes]
text = """
Nested-loop variant of the bound-sensitive family (0002 / 0008 /
0014). The body is the inner loop (~16 cycles per outer iteration,
including inner-init), so 3 × ~20 + entry + post-loop ≈ 65 cycles
to reach the marker. Reference spec ships with bound=80.

The witness's halted_step has tolerance=5 because the per-cycle
count depends on whether the outer-init cycles are counted at the
entry boundary or at the start of the first iteration; both are
defensible and the verdict doesn't turn on the difference.

T2 for the same reason as 0008/0014 — the LLM must bump bound past
the default. The nested structure adds variance: a smart-but-not-
careful bumping ("bound = 30 should cover it") will *still* return
unreachable, forcing a second pass.
"""
