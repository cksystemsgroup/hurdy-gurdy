[task]
id = "0024-loop-then-mul"
task_class = "register-equality"
difficulty = "T2"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
The program loops while x5 != 5, incrementing x5 by 1. After the
loop exits (x5 = 5), it computes x10 = x5 * x5 and halts. Can x10
hold the value 25 at the ebreak?
"""

[expected]
verdict = "reachable"

[witness]
bad_pc = 65548
halted_step = 13
halted_step_tolerance = 3

[witness.final_regs]
10 = 25
5 = 5

[notes]
text = """
Combines a bounded loop (5 iterations) with a non-trivial post-loop
arithmetic (MUL). Tests that the BMC encoding of MUL produces the
expected low-64-bit product after a state has evolved through a
loop.

T2 because the LLM must pick a bound covering ~13 cycles. Default
bound is too small.

RegisterInit(5, eq, 0) pins the entry value so the loop body
executes the expected 5 times.
"""
