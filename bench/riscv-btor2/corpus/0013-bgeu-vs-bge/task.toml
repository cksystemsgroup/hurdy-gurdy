[task]
id = "0013-bgeu-vs-bge"
task_class = "register-equality"
difficulty = "T4"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[lift]
expected_cause_pc = 65540
expected_cause_mnemonic = "BGEU"
acceptable_alternative_pcs = []
expected_explanation_summary = """
BGEU is the unsigned ≥ comparison (SCHEMA.md §5). With
x5 = 0xFFFFFFFFFFFFFFFF (= 2^64 - 1 unsigned, the largest possible
value) and x6 = 1, 2^64-1 ≥ 1 is true, so the branch is taken and
x10 = 42 at the taken-arm halt. The fallthrough path that would
have set x10 = 99 is unreachable because the unsigned comparison
forces the branch.
"""
expected_keywords = ["unsigned", "BGEU", "U-suffix", "2^64"]

[question]
text = """
The program loads x5 = -1 (= 0xFFFFFFFFFFFFFFFF), x6 = 1, then
branches with `bgeu x5, x6, taken`. The fallthrough path sets
x10 = 99; the taken path sets x10 = 42. Can register x10 hold the
value 99 after halt?
"""

[expected]
verdict = "unreachable"

[notes]
text = """
SCHEMA.md §5 (branches): BGEU is the *unsigned* "≥" — its operands
are interpreted as uint64. With x5 = 0xFFFFFFFFFFFFFFFF (= 2^64 - 1
unsigned, the largest possible value) and x6 = 1, the comparison
2^64 - 1 ≥ 1 is true, so the branch is taken and x10 = 42.

The fallthrough path (which would set x10 = 99) is unreachable
because BGEU's *unsigned* semantics make the branch condition true.
A signed reading (BGE) would say -1 < 1 and fall through.

Lowering-sensitive because the four B-form variants (BEQ/BNE/BLT/BGE
vs their U cousins) look mnemonically interchangeable; the U
distinction matters precisely on values whose top bit is set.

This task has two ebreaks (PCs 0x1000C and 0x10012, the fallthrough
and the taken arms). The observable's PC is the taken-path ebreak
(0x10012 = 65554), which is the actually-reached halt; for an
unreachable verdict no witness is needed, but the rubric still
checks the verdict label.
"""
