[task]
id = "0033-store-load-byte-roundtrip"
task_class = "memory-equality"
difficulty = "T1"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
The program loads constant 0xCAFEBABE into register x5, stores it
to address 0x40000 with `sd`, then reloads it from the same address
with `ld` into x10. After halt, can register x10 hold 0xCAFEBABE
AND the 8 bytes at 0x40000 read as 0xCAFEBABE?
"""

[expected]
verdict = "reachable"

[witness]
bad_pc = 65562
halted_step = 7
halted_step_tolerance = 2

[witness.final_regs]
10 = 0xCAFEBABE
5 = 0xCAFEBABE
6 = 0x40000

[witness.memory]
0x40000 = { width = 8, value = 0xCAFEBABE }

[notes]
text = """
First corpus task to exercise:
  - the `MemoryAt` observable type alongside RegisterAt
  - the `mem(addr, width)` form in property expressions (here
    width=8 so the read returns bv64, comparable to const() which
    is bv64 by default)
  - the [witness.memory] table in the matcher's fingerprint check

The program is short and deterministic; SCHEMA.md §5 (RV64I
loads/stores) guarantees sd-then-ld at the same address round-
trips. No lowering trickery -- this task validates the memory
observable plumbing end-to-end.

Property width note: width=8 (`mem(A, 8)`) is required for direct
comparison against `const(K)` because the DSL's `const` always
emits bv64 and `mem(A, w)` emits bv(8w) -- comparing widths must
match. For byte-level memory checks the corpus author should
either (a) read 8 bytes and compare against a 64-bit value with
the byte at the right LE position, or (b) check the byte through
a register read (see 0010-lh-endianness).

Companion to v0.2 plan track A1 (memory observables, 5 tasks).
"""
