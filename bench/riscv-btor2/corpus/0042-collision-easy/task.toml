[task]
id = "0042-collision-easy"
task_class = "register-equality"
difficulty = "T2"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
The program branches on whether x6 is signed-less-than 10. On
the LO path (x6 < 10) it sets x10 = x6 + 5; on the HI path
(x6 >= 10) it sets x10 = x6 - 5. The entry value of x6 is a
free input. After halt, can register x10 hold the value 12?
"""

[expected]
verdict = "reachable"

[witness]
bad_pc = 65552
halted_step = 4
halted_step_tolerance = 2

[witness.final_regs]
10 = 12

[notes]
text = """
Two-path collision. The output value 12 is reachable via two
distinct input values, on two distinct control-flow paths:

  - LO path (x6 < 10):   x10 = x6 + 5  → x6 = 7
  - HI path (x6 >= 10):  x10 = x6 - 5  → x6 = 17

BMC will pick one (typically the smaller-numbered input the
solver explores first). The witness is whichever it picks; the
matcher only requires x10 = 12, so either is acceptable.

This task exercises BMC's path enumeration: a deterministic
single-path program would only reach x10 = 12 via one specific
input, but here there's genuine non-determinism in the
satisfying assignments. Pairs naturally with 0041 (single-path
input synthesis) -- 0041 has one solution, 0042 has many.

x6 is left unconstrained in final_regs since there are multiple
valid satisfying assignments and the LLM may report either.

Companion to v0.2 plan A3 (free-input search).
"""
