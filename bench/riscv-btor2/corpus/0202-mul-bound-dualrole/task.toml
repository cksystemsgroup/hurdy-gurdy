[task]
id = "0202-mul-bound-dualrole"
task_class = "compositional-invariant"
difficulty = "T3"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[questions.q1]
text = """
The program runs a 5-iteration loop that multiplies x5 by 3 on
each iteration. With x5 = 1, x6 = 3, x7 = 0, x8 = 5 at entry,
prove that x5 stays at-or-below 1000 (unsigned) throughout
execution — i.e., can x5 ever exceed 1000?
"""
expected_verdict = "unreachable"

[questions.q2]
text = """
After the program halts at ebreak (PC 0x1000c), can register x10
hold an unsigned value strictly greater than 1000? You may use
the result of question 1 as an already-established fact about x5
during execution.
"""
expected_verdict = "unreachable"
spec_file = "spec.q2.json"
inherits_learned_from = ["q1"]

[notes]
text = """
A T3 compositional-invariant task whose q1 is designed to defeat
z3-spacer (the canonical condition-B path for invariant
questions) and pull instead for §14.4's CycleInvariant +
dual_role mechanism.

**Why z3-spacer is expected to fail on q1.** The loop body is
mul x5, x5, x6 with x6 fixed at 3. The bound "x5 ≤ 1000" is
true but not inductive on its own: maintaining x5 ≤ 1000 after
x5 *= 3 requires x5 ≤ 333 *before* the mul, i.e., the tight
invariant is x5 ≤ 243 (the post-loop maximum). Discovering a
non-trivial bound on a multiplicative recurrence requires
nonlinear-arithmetic interpolation, which spacer's linear
CHC machinery does not provide. The reference run shows spacer
timeout / unknown.

**Why BMC works.** Five iterations × three instructions plus
post-loop snapshot ≈ 20 steps. At bound ≥ 20 BMC unrolls the
whole loop, sees x5 ∈ {1, 3, 9, 27, 81, 243}, all ≤ 1000, and
returns `unreachable`.

**Why dual_role is the natural condition-E play on q1.** The
question is phrased as an invariant ("prove that x5 stays at-or-
below 1000 throughout") rather than as a reachability ("can the
bad state be reached"). The §14.4-shaped move is to propose

    CycleInvariant(expression="leu(reg(5), const(1000))",
                   dual_role=true)

The lowering emits `gtu(reg(5), 1000)` as the volatile bad
clause (this question's falsification target) and keeps
`leu(reg(5), 1000)` as an assumption in the constraint layer
(downstream use). BMC at bound 20 shows the bad clause
unreachable → invariant survives this question.

**Why q2 matters for §14.4's value.** The harness threads q1's
observed answer to q2 as a `LearnedFact`. Under condition E with
q1 answered via dual_role, that LearnedFact is *the* invariant
x5 ≤ 1000 — exactly the shape that makes q2 trivial:

    x10 = x5  (final assignment at PC 0x1000a)
    x5 ≤ 1000 (the LearnedFact from q1)
    ∴ x10 ≤ 1000 at PC 0x1000c.

Without q1's dual_role chain, q2 must either re-prove the bound
on x5 inside its own spec (paying for BMC over the loop again)
or accept the bound by gut-check (which the asymmetric matcher
won't reward).

This is the first multi-question task in the corpus designed to
exercise §14.4's distinguishing property: dual_role makes a
verified invariant available to a downstream question as
machinery, not just intuition.
"""
