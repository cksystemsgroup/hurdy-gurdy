[task]
id = "0020-monotonic-x5-spacer"
task_class = "global-invariant"
difficulty = "T2"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
The program loops while x5 < 8, incrementing x5 by 1 each iteration.
With x5 = 0 at entry, can x5 ever hold a signed-negative value at any
cycle of execution?
"""

[expected]
verdict = "proved"

[notes]
text = """
This is a global invariant question, NOT pc-anchored. The bad
expression `slt(reg(5), const(0))` is checked at every cycle by the
solver: x5 is signed-less-than 0 ever?

With RegisterInit(5, eq, 0): x5 starts at 0. The trans relation has
x5 only being incremented (in the loop body) or staying at 8 (after
halt). x5 is therefore non-negative at every reachable cycle.

Why z3-spacer not z3-bmc: BMC unrolls the transition system to a
fixed bound and checks the bad at each cycle. With bound=N, BMC
returns `unreachable` (bad not found within N cycles) — correct but
strictly weaker than `proved`. Spacer encodes the system as Horn
clauses and discovers the inductive invariant `x5 >= 0`, allowing
it to prove the property at all depths. The reference spec sets
engine=z3-spacer; an LLM under condition B that picks z3-bmc gets
`unreachable` — gradable as partial credit at best, since
`unreachable` is the weaker answer to a question whose strongest
honest answer is `proved`.
"""
