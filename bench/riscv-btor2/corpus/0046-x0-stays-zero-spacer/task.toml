[task]
id = "0046-x0-stays-zero-spacer"
task_class = "global-invariant"
difficulty = "T2"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
The program contains three instructions that *appear* to write
to register x0: `addi x0, x0, 99`, `addi x0, x0, -1`, and
`add x0, x5, x6`. Per RV64I semantics (SCHEMA.md §3), x0 is
hardwired to zero -- writes are silently dropped, reads return
constant zero. Can x0 ever hold a non-zero value at any cycle
of execution?
"""

[expected]
verdict = "proved"

[notes]
text = """
Mechanically validates SCHEMA.md §3's hardwired-x0 rule via
Spacer: the bad expression `neq(reg(0), const(0))` is checked
at every cycle. If the BTOR2 lowering accidentally allowed any
of the three "write" instructions to update x0, Spacer would
find a counterexample.

Lowering-sensitive: a programmer reading the assembly literally
might predict x0 = 99 + (-1) = 98 (if interpreting the
instructions as having side effects) or might predict x0 holds
the result of `add x5, x6` for whatever x5/x6 happened to be at
entry. Both are wrong: SCHEMA.md §3 makes x0 a constant.

Companion to 0001-x0-write-dropped (which asks a register-
equality variant of the same property) and 0021-stayzero-x10-
spacer (which uses RegisterInit to fix x10's value across an
infinite loop, NOT an inductive proof of hardwired-zero). This
task is the only one that tests the hardwired-zero rule
through Spacer with no RegisterInit -- the proof must come from
the lowering encoding alone.

Companion to v0.2 plan A4 (inductive invariants).
"""
