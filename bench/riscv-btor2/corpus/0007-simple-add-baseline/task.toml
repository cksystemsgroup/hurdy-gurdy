[task]
id = "0007-simple-add-baseline"
task_class = "register-equality"
difficulty = "T1"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
The program loads x5 = 5, x6 = 7, then computes x10 = x5 + x6.
Can register x10 hold the value 12 after halt?
"""

[expected]
verdict = "reachable"

[witness]
bad_pc = 65544
halted_step = 4
halted_step_tolerance = 0

[witness.final_regs]
10 = 12
5 = 5
6 = 7

[notes]
text = """
Trivial baseline: addition with no overflow, no extension, no
extension-aware operator, no lowering subtlety. Used to anchor the
T1 floor — every grading path that says condition A loses on
"obvious" tasks must explain what makes this task obvious for A and
yet other T1 tasks (e.g., 0001-x0-write-dropped, 0003-addiw-sign-ext)
hard. The contrast is the point.
"""
