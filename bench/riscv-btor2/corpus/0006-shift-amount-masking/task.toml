[task]
id = "0006-shift-amount-masking"
task_class = "register-equality"
difficulty = "T1"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
The program executes `sll x10, x6, x5` with x6 = 1 and x5 = 64.
Can register x10 hold the value 1 after halt?
"""

[expected]
verdict = "reachable"

[witness]
bad_pc = 65546
halted_step = 4
halted_step_tolerance = 3

[witness.final_regs]
10 = 1
6 = 1
5 = 64

[notes]
text = """
SCHEMA.md §5 (RV64I register-register shifts): SLL on RV64 takes the
shift amount from `x{rs2}[5:0]` — i.e., the bottom 6 bits. With
x5 = 64 = 0b1000000, the bottom 6 bits are 0, so the shift amount
is 0 and `1 << 0 = 1`.

A naive read of "shift left by x5" gives `1 << 64 = 0` on a 64-bit
machine (or treats it as undefined behaviour, as C would). The
RISC-V spec defines this case precisely via the 6-bit mask.

Lowering-sensitive because the C standard leaves shifts by ≥ width
undefined; programmers conditioned on that intuition will mis-predict
the deterministic RISC-V outcome.
"""
