[task]
id = "0036-stack-canary-replay"
task_class = "memory-equality"
difficulty = "T2"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
The program loads the constant 0xCAFEBABE into x5 (via a multi-
instruction synthesis), spills x5 to memory at 0x40000 with `sd`,
overwrites x5 with 0, then reloads x10 from 0x40000 with `ld`.
After halt, can register x10 hold 0xCAFEBABE AND register x5 hold 0
AND the 8 bytes at 0x40000 read as 0xCAFEBABE?
"""

[expected]
verdict = "reachable"

[witness]
bad_pc = 65560
halted_step = 8
halted_step_tolerance = 2

[witness.final_regs]
10 = 0xCAFEBABE
5 = 0
2 = 0x40000

[witness.memory]
0x40000 = { width = 8, value = 0xCAFEBABE }

[notes]
text = """
Stack-style register-spill round-trip. The pattern -- spill a
value, do work that clobbers the register, reload from memory --
is the canonical "register pressure" idiom in compiled code, and
its correctness depends on the memory model preserving stored
values across unrelated register operations.

The 0xCAFEBABE constant doesn't fit a single addi immediate
(simm12 range), so the assembler emits a lui+addw+sll+add chain
to synthesize it. This is incidentally a useful test of the
SCHEMA.md §5 W-suffix sign-extension rules feeding into a memory
write: the addw step's 32-bit result is sign-extended to 64
before storage, and the subsequent SLL operates on the full 64
bits, so getting the synthesis correct requires walking the
arithmetic carefully.

The witness fingerprint pins x10, x5, x2 (sp), and the 8-byte
memory cell at the spill address -- enough to distinguish
"correct round-trip" from "right verdict, wrong reasoning" per
BENCHMARKING.md §4.5.

Companion to v0.2 plan A1 (memory observables).
"""
