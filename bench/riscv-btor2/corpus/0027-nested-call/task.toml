[task]
id = "0027-nested-call"
task_class = "register-equality"
difficulty = "T3"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
The program calls A, which calls B. B adds 7 to x10, returns to A;
A adds 5 to x10, returns to _start; _start computes x20 = x10 + 100
and halts. With x10 = 0 at entry, can x20 == 112 at the ebreak?
"""

[expected]
verdict = "reachable"

[witness]
bad_pc = 65544
halted_step = 7
halted_step_tolerance = 3

[witness.final_regs]
20 = 112
10 = 12

[notes]
text = """
Two-deep call chain. Both A and B must be in `included_callees`;
omitting either freezes execution before reaching the ebreak.

Uses a non-standard linkage: A calls B with `jal x6, B` so that
the outer return address (x1, set by `_start`'s `jal x1, A`) is
not clobbered. RISC-V allows any register as the link register;
using x6 here avoids the need to model a stack.

T3 because the LLM must scope-decompose at TWO levels — recognize
both callees need inclusion. A common partial-credit failure is
including only A.
"""
