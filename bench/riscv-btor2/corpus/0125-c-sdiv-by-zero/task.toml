[task]
id = "0125-c-sdiv-by-zero"
task_class = "assertion-reachability"
difficulty = "T2"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[question]
text = """
A bare-metal C program computes q = 42 / 0 (signed integer division
by zero) then widens q to long z and traps if z != -1. C says division
by zero is UB; on RV64 the RISC-V ISA specifies that divw returns -1
(all-bits-set) when the divisor is zero. W-suffix sign-extension and C's
signed widening both preserve the -1, giving z = -1L. Can the `trap`
function be reached?
"""

[expected]
verdict = "unreachable"

[c]
opt_level = "0"
bound     = 60

[notes]
text = """
Signed counterpart to 0116-c-divu-sentinel (unsigned division by zero).
Both 0116 and 0125 target SCHEMA.md §13's sentinel-on-exception contract:

  unsigned (0116): divuw(42, 0) → all-ones sentinel = 0xFFFFFFFF,
                   gcc emits zero-extension → z = 0x00000000FFFFFFFF
  signed   (0125): divw(42, 0) → all-ones sentinel = -1 (RISC-V ISA
                   §M), W-suffix sign-extends → z = -1L

A C-level analyser that models division by zero as UB (non-deterministic
result) will falsely report trap reachable. Hurdy-gurdy's BTOR2 lowering
encodes the RISC-V sentinel contract explicitly and proves the assertion
holds.

Pinned to -O0 so gcc does not rewrite the division (at -O1+ the compiler
may detect a constant-divisor-zero pattern and substitute UB-removal or
constant propagation).

Part of the adversarial wedge battery from NEXT_STEPS.md §4.
"""
