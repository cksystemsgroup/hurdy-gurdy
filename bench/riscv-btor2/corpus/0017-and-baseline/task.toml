[task]
id = "0017-and-baseline"
task_class = "register-equality"
difficulty = "T1"
lowering_sensitive = false
oracle_provenance = "manual-proof"

[question]
text = """
The program loads x5 = 12 (0b1100), x6 = 10 (0b1010), then computes
`and x10, x5, x6`. Can register x10 hold the value 8 after halt?
"""

[expected]
verdict = "reachable"

[witness]
bad_pc = 65544
halted_step = 4
halted_step_tolerance = 3

[witness.final_regs]
10 = 8
5 = 12
6 = 10

[notes]
text = """
Trivial bitwise AND: 0b1100 & 0b1010 = 0b1000 = 8. T1 baseline,
non-LS. Anchors the bitwise-op tier alongside 0007 (ADD), 0012
(MUL), and 0018 (OR).
"""
