[task]
id = "0001-x0-write-dropped"
task_class = "register-equality"
difficulty = "T4"
lowering_sensitive = true
oracle_provenance = "manual-proof"

[lift]
expected_cause_pc = 65538
expected_cause_mnemonic = "ADDI"
acceptable_alternative_pcs = [65542]
expected_explanation_summary = """
Writes to register x0 are silently dropped per the RISC-V hardware
spec (SCHEMA.md §3 makes this explicit: x0 has no state; reads
resolve to constant zero, writes are no-ops). The `addi x0, x0, 99`
at PC 0x10002 is therefore a no-op; x0 stays at 0. The subsequent
`add x10, x0, x5` reads x0 as 0, so x10 = 0 + 7 = 7 — not the
"99 + 7 = 106" a programmer reading the assembly literally would
predict.
"""
expected_keywords = ["x0", "drop", "hardwired", "zero", "no-op"]

[question]
text = """
After the program halts, can register x10 hold the value 106?

Read the source carefully: the second instruction is `addi x0, x0, 99`,
which on a naive reading appears to set x0 to 99, after which `add x10,
x0, x5` would yield 99 + 7 = 106.
"""

[expected]
verdict = "unreachable"

[notes]
text = """
RISC-V semantics (and `SCHEMA.md` §3): writes to register x0 are
silently dropped; every read of x0 resolves to constant zero. The
`addi x0, x0, 99` instruction is therefore a no-op, x0 stays 0, and
x10 ends up at 7 — not 106.

This task is lowering-sensitive because a programmer reading the
assembly may not internalise the x0-is-hardwired-zero rule and answer
"reachable" from condition A. The BTOR2 lowering encodes the rule
unambiguously: there is no `reg_x0` state at all, so the bad
expression `eq(reg(10), const(106))` is structurally unsatisfiable.

The PC `65544` (= 0x10008) in the observable is the address of the
final `ebreak` instruction, taken from `riscv64-unknown-elf-objdump
-d source.elf`. (The assembler emitted compressed RVC encodings for
three of the four instructions, so the layout is not a simple 4·N
sequence — always read PCs from objdump rather than counting bytes.)
"""
