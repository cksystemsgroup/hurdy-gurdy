# The sail-riscv source-semantics group — a correctness commons.
# Every hop whose source is rv64 shares this oracle and its lemmas. The group
# key is (language, artifact, version): a Sail bump is a re-verification event
# for every member and every realization.
language: rv64
artifact: sail-riscv
# Versioning + provenance live in the registration (registry/models/sail-riscv.yaml).
# NOTE (honesty): the Sail source is NOT byte-vendored here — there is no model/
# dir. The reference is the transcribed reference_rv64.py, cross-validated against
# the pinned emulator binary below. A bump there => regenerate + re-verify.
emulator_release: "0.12"         # the sail_riscv_sim release the reference is checked against

# Two realizations of the same semantics. Fidelity of the machine realization
# = it agrees with the reference (the whole-machine equivalence proof).
realizations:
  emulator:
    role: reference              # the differential ground truth (sandboxed behind the gate)
    entry: realizations/emulator/oracle.py
    binary: sail_riscv_sim       # the pinned upstream release binary the oracle shells to
    emulator_release: "0.12"     # github.com/riscv/sail-riscv release tag (binary; see Dockerfile)
  btor2-machine:
    role: model                  # the model-checkable form, produced by tools/sail_btor2_machine
    artifact: realizations/btor2-machine/model.btor2
    fidelity_report: realizations/btor2-machine/MachineFidelityReport.json
    # GREEN for the RV64I/M ALU slice (43 instrs: reg-reg, reg-imm, W-ops, LUI,
    # AUIPC, M mul/div). All three obligations discharged:
    #  (1) per-instruction QF_BV execute lemmas vs reference_rv64 (z3, 43/43);
    #  (2) reference_rv64 cross-validated against the real Sail emulator v0.12
    #      (reference_vs_sail_ok=True; + machine-decoder vs Sail, 610 steps);
    #  (3) the fetch/decode/dispatch/writeback/pc HARNESS lemma — machine_step ==
    #      independent reference step (z3, non-vacuous). The emitted model.btor2
    #      is a full transition system, model-checked == Sail by pono (see
    #      tools/sail_btor2_machine/btor2_check.py).
    # OUT OF SLICE (not claimed): control flow (branches/jumps), loads/stores,
    # CSRs, traps, privileged, FP. Adding any is a re-verification event.
    equivalence: GREEN         # published by the machine gate (gate/machine/verify_machine.py)

idf_allowlist: idf_allowlist.yaml
